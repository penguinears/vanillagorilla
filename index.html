<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vanilla Gorilla Intro + Gameplay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: system-ui, sans-serif; }

    #scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    /* INTRO GORILLA */
    #gorilla {
      position: absolute;
      width: 300px;
      bottom: -250px;
      left: -250px;
      transform: rotate(25deg);
      opacity: 0;
      animation: fly 4s ease-out forwards;
      animation-delay: 0.3s;
    }

    @keyframes fly {
      0% { bottom: -250px; left: -250px; opacity: 1; transform: rotate(25deg); }
      50% { opacity: 1; }
      100% { bottom: 100vh; left: 100vw; opacity: 0; transform: rotate(25deg); }
    }

    #vanillaText {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.1) rotate(-180deg);
      font-size: 3.5rem;
      letter-spacing: 0.2em;
      color: #fff;
      opacity: 0;
      animation: vanillaSpin 2.5s ease-out forwards;
      animation-delay: 2s;
    }

    @keyframes vanillaSpin {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.1) rotate(-180deg); }
      30% { opacity: 1; transform: translate(-50%, -50%) scale(1.1) rotate(10deg); }
      60% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9) rotate(20deg); }
    }

    /* BLACK OVERLAY FOR STORY */
    #overlay {
      position: absolute;
      inset: 0;
      background: #000;
      opacity: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 1s ease;
    }

    #storyText {
      max-width: 80vw;
      text-align: center;
      font-size: 1.8rem;
      line-height: 1.5;
      opacity: 0;
      transition: opacity 1s ease;
      color: #fff;
    }

    /* GAMEPLAY SCREEN */
    #gameplay {
      position: absolute;
      inset: 0;
      background: #3aa0ff; /* blue sky */
      display: none;
      overflow: hidden;
    }

    #player {
      position: absolute;
      width: 180px;
      left: 150px;
      top: 50%;
      transform: translateY(-50%) rotate(0deg);
      transition: transform 0.1s linear;
    }
  </style>
</head>
<body>
  <div id="scene">
    <img id="gorilla" src="images/gor1-removebg-preview.png" />
    <div id="vanillaText">VANILLA GORILLA</div>

    <div id="overlay">
      <div id="storyText"></div>
    </div>

    <!-- GAMEPLAY -->
    <div id="gameplay">
      <img id="player" src="images/gor2-removebg-preview.png" />
    </div>
  </div>

  <script>
    const overlay = document.getElementById("overlay");
    const storyText = document.getElementById("storyText");
    const gameplay = document.getElementById("gameplay");
    const player = document.getElementById("player");

    function showOverlay() { overlay.style.opacity = "1"; }

    function showText(text) {
      storyText.style.opacity = "0";
      setTimeout(() => {
        storyText.textContent = text;
        storyText.style.opacity = "1";
      }, 400);
    }

    // TIMINGS
    const blackScreenTime = 4500;
    const firstLineTime = blackScreenTime + 1000;
    const secondLineTime = firstLineTime + 4000;
    const startGameTime = secondLineTime + 4000;

    // Fade to black
    setTimeout(showOverlay, blackScreenTime);

    // Story text
    setTimeout(() => {
      showText("The year is 2067 — 80 years since Hitler won the war.");
    }, firstLineTime);

    setTimeout(() => {
      showText("You are the British last hope. Fly past the German army and crash into him to end it.");
    }, secondLineTime);

    // Fade into gameplay
    setTimeout(() => {
      overlay.style.opacity = "0";
      setTimeout(() => {
        overlay.style.display = "none";
        gameplay.style.display = "block";
        startGame();
      }, 1000);
    }, startGameTime);

    /* -------------------------
       FLAPPY BIRD MOVEMENT
    --------------------------*/
    let y = window.innerHeight / 2;
    let velocity = 0;
    const gravity = 0.5;
    const flapStrength = -9;

    function startGame() {
      document.addEventListener("keydown", flap);
      document.addEventListener("mousedown", flap);

      function gameLoop() {
        velocity += gravity;
        y += velocity;

        // Keep player on screen
        if (y < 0) { y = 0; velocity = 0; }
        if (y > window.innerHeight - 100) { y = window.innerHeight - 100; velocity = 0; }

        player.style.top = y + "px";

        // ROTATION BASED ON VELOCITY
        let angle = velocity * 2;
        if (angle > 40) angle = 40;
        if (angle < -40) angle = -40;

        player.style.transform = `rotate(${angle}deg)`;

        requestAnimationFrame(gameLoop);
      }

      function flap() {
        velocity = flapStrength;
      }

      gameLoop();
    }
  </script>
</body>
</html>
