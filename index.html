<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vanilla Gorilla</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:sans-serif;}
#scene{width:100vw;height:100vh;background:#3aa0ff;position:relative;overflow:hidden;}
#gorillaIntro{position:absolute;width:260px;bottom:-220px;left:-220px;transform:rotate(25deg);opacity:0;animation:flyIntro 4s ease-out forwards;animation-delay:0.3s;}
@keyframes flyIntro{0%{bottom:-220px;left:-220px;opacity:1;}100%{bottom:100vh;left:100vw;opacity:0;}}
#vanillaText{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.1) rotate(-180deg);font-size:3rem;color:#fff;opacity:0;animation:vanillaSpin 2.5s ease-out forwards;animation-delay:2s;}
@keyframes vanillaSpin{0%{opacity:0;transform:translate(-50%,-50%) scale(0.1) rotate(-180deg);}40%{opacity:1;transform:translate(-50%,-50%) scale(1.1) rotate(10deg);}100%{opacity:0;}}
#overlay{position:absolute;inset:0;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;text-align:center;opacity:0;transition:opacity 1s;z-index:5;}
#skipBtn{position:absolute;bottom:15px;right:15px;padding:8px 14px;background:#000;color:#fff;border:2px solid #fff;z-index:6;}
#gameLayer{position:absolute;inset:0;display:none;}
#worldStack{position:absolute;width:100%;height:200vh;transition:transform 0.5s;}
#gameWorld{position:absolute;width:100%;height:100vh;}
#player{position:absolute;width:22vw;max-width:110px;left:140px;top:50%;transform:translateY(-50%);}
.plane{position:absolute;width:28vw;max-width:140px;}
#score{position:absolute;top:15px;left:20px;color:#fff;font-size:1.5rem;}
#hearts{position:absolute;top:15px;right:20px;font-size:1.6rem;}
#pauseBtn{position:absolute;bottom:15px;left:15px;padding:8px 12px;background:#000;color:#fff;border:2px solid #fff;}
#deathScreen{position:absolute;top:100vh;width:100%;height:100vh;}
#deathImage{position:absolute;bottom:0;width:100%;}
#deathText{position:absolute;top:60px;left:50%;transform:translateX(-50%);color:#fff;text-align:center;}
button{cursor:pointer;}
</style>
</head>
<body>
<div id="scene">
<img id="gorillaIntro" src="images/gor1-removebg-preview.png">
<div id="vanillaText">VANILLA GORILLA</div>
<div id="overlay"><div id="storyText"></div></div>
<button id="skipBtn">Skip</button>
<div id="gameLayer">
<div id="worldStack">
<div id="gameWorld">
<div id="score">Score: 0</div>
<div id="hearts">❤️❤️❤️</div>
<button id="pauseBtn">Pause</button>
<img id="player" src="images/gor2-removebg-preview.png">
</div>
<div id="deathScreen">
<div id="deathText">
<h1>YOU DIED</h1>
<p id="scoreLine"></p>
<p id="bestScoreLine"></p>
<button id="restartBtn">Restart</button>
</div>
<img id="deathImage" src="images/dead gor.png">
</div>
</div>
</div>
</div>

<script>
const overlay=document.getElementById("overlay");
const storyText=document.getElementById("storyText");
const skipBtn=document.getElementById("skipBtn");
const gameLayer=document.getElementById("gameLayer");
const worldStack=document.getElementById("worldStack");
const player=document.getElementById("player");
const scoreEl=document.getElementById("score");
const heartsEl=document.getElementById("hearts");
const pauseBtn=document.getElementById("pauseBtn");
const scoreLine=document.getElementById("scoreLine");
const bestScoreLine=document.getElementById("bestScoreLine");
const restartBtn=document.getElementById("restartBtn");

let y, velocity, lives, score, safeFrames, scoreTimer;
const flapStrength=-11.5;
let running=false, paused=false, started=false;
let planes=[];
let bestScore=parseInt(localStorage.getItem("vg_best_score")||"0");

let seenStory=localStorage.getItem("vg_seen_intro");

/* STORY ONLY FIRST VISIT */
function playStory(){
  overlay.style.opacity="1";
  setTimeout(()=>{storyText.textContent="The world is no longer safe...";},1000);
  setTimeout(()=>{storyText.textContent="You are the last hope.";},4000);
  setTimeout(()=>{
    overlay.style.opacity="0";
    setTimeout(()=>{overlay.style.display="none"; startGame();},1000);
  },7000);
  localStorage.setItem("vg_seen_intro","1");
}

/* SKIP BUTTON */
skipBtn.onclick=()=>{
  overlay.style.display="none";
  skipBtn.style.display="none";
  startGame();
};

/* INPUT */
document.addEventListener("keydown",e=>{if(e.code==="Space"||e.code==="ArrowUp") flap();});
document.addEventListener("mousedown",flap);
document.addEventListener("touchstart",e=>{e.preventDefault(); flap();});

pauseBtn.onclick=()=>{paused=!paused; pauseBtn.textContent=paused?"Resume":"Pause";}

function flap(){if(!running||paused)return; started=true; velocity=flapStrength;}

/* SPAWN PLANES */
function spawnPlane(gap=false){
  if(gap){
    let gapY=Math.random()*(window.innerHeight-200)+100;
    createPlane(gapY-180); createPlane(gapY+180); return;
  }
  createPlane(Math.random()*(window.innerHeight-200)+80);
}
function createPlane(yPos){
  const p=document.createElement("img");
  p.src="images/plane-removebg-preview.png"; p.className="plane";
  p.style.top=yPos+"px"; p.style.left=window.innerWidth+"px";
  p.dataset.speed=(0.9+Math.random()*0.6+Math.min(1.2,safeFrames/600));
  gameWorld.appendChild(p); planes.push(p);
}

/* COLLISION */
function hit(a,b){const ar=a.getBoundingClientRect(); const br=b.getBoundingClientRect();
return !(ar.right<br.left||ar.left>br.right||ar.bottom<br.top||ar.top>br.bottom);}
function shake(){document.body.style.transform="translate(6px)"; setTimeout(()=>document.body.style.transform="translate(-6px)",50); setTimeout(()=>document.body.style.transform="translate(0)",100);}

function updateHearts(){heartsEl.textContent="❤️".repeat(lives);}

/* GAME LOOP */
function loop(){
  if(!running) return;
  if(!paused){
    safeFrames++;
    if(started) velocity+=0.18, y+=velocity;

    const playerHeight=parseFloat(getComputedStyle(player).height);
    if(y<0) y=0;
    if(y>window.innerHeight-playerHeight) y=window.innerHeight-playerHeight;

    player.style.top=y+"px";
    let angle=velocity*1.6; if(angle>25)angle=25; if(angle<-25)angle=-25;
    player.style.transform=`translateY(-50%) rotate(${angle}deg)`;

    if(safeFrames>180 && Math.random()<0.02) spawnPlane(Math.random()<0.3);

    planes.forEach((p,i)=>{
      let left=parseFloat(p.style.left)-parseFloat(p.dataset.speed);
      p.style.left=left+"px";

      if(hit(player,p)){
        lives--; updateHearts(); shake();
        planes.splice(i,1); p.remove();
        if(lives<=0){triggerDeath(); return;}
      }

      if(left<-250){p.remove(); planes.splice(i,1);}
    });

    scoreTimer++;
    if(scoreTimer>=14){score++; scoreTimer=0; scoreEl.textContent="Score: "+score;}
  }
  requestAnimationFrame(loop);
}

/* DEATH */
function triggerDeath(){
  running=false; started=false; let dv=0;
  function fall(){dv+=0.9; y+=dv; player.style.top=y+"px";
    if(y<window.innerHeight+160) requestAnimationFrame(fall);
    else showDeath();
  } fall();
}
function showDeath(){
  if(score>bestScore){bestScore=score; localStorage.setItem("vg_best_score",bestScore);}
  scoreLine.textContent="Score: "+score; bestScoreLine.textContent="Best: "+bestScore;
  worldStack.style.transform="translateY(-100vh)";
}

/* RESTART */
restartBtn.onclick=()=>{
  worldStack.style.transition="none"; worldStack.style.transform="translateY(0)";
  planes.forEach(p=>p.remove()); planes=[];
  startGame();
  setTimeout(()=>worldStack.style.transition="transform 0.5s",50);
}

/* START GAME */
function startGame(){
  gameLayer.style.display="block";
  y=window.innerHeight/2; velocity=0; lives=3; score=0; safeFrames=0; scoreTimer=0;
  started=false; running=true; paused=false; updateHearts();
  player.style.top=y+"px";
  player.style.transform="translateY(-50%) rotate(0deg)";
  loop();
}

/* INIT */
setTimeout(()=>{
  if(seenStory) startGame();
  else playStory();
},4500);
</script>
</body>
</html>
