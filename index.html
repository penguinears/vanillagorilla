<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanilla Gorilla</title>
<link rel="icon" type="image/png" href="images/goggg-removebg-preview.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  user-select:none;
  -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
}
body{
  background:#000;
  overflow:hidden;
  font-family:sans-serif;
}
img{
  user-select:none;
  -webkit-user-drag:none;
  pointer-events:none;
}

#scene{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:#3aa0ff;
}

/* OVERLAY */
#overlay{
  position:absolute;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#fff;
  font-size:1.6rem;
  opacity:1;
  pointer-events:auto;
  z-index:5;
}
#overlayText{
  padding:10px 20px;
}
#overlayHint{
  margin-top:10px;
  font-size:1rem;
  opacity:0.8;
}

/* GAME LAYER */
#gameLayer{
  position:absolute;
  inset:0;
  background:#3aa0ff;
  display:block;
  overflow:hidden;
  z-index:3;
}

#worldStack{
  position:absolute;
  left:0;
  top:0;
  width:100%;
  height:200vh;
  transition:transform 0s;
}

#gameWorld{
  position:absolute;
  left:0;
  top:0;
  width:100%;
  height:100vh;
  overflow:hidden;
}

/* PLAYER */
#player{
  position:absolute;
  width:100px;
  left:150px;
  top:50%;
  transform:translateY(-50%) rotate(0deg);
  transition:transform 0.06s linear;
  z-index:4;
}

/* OBJECTS */
.plane{
  position:absolute;
  width:120px;
  z-index:3;
}
.banana{
  position:absolute;
  width:55px;
  z-index:3;
}

/* MEGA WAVE */
#megaWaveBanner{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:8;
  display:none;
}
.mega-shake{
  animation:megaShake 0.6s linear infinite;
}
@keyframes megaShake{
  0%{transform:translate(-50%,-50%) translateX(-4px);}
  25%{transform:translate(-50%,-50%) translateX(4px);}
  50%{transform:translate(-50%,-50%) translateX(-4px);}
  75%{transform:translate(-50%,-50%) translateX(4px);}
  100%{transform:translate(-50%,-50%) translateX(0);}
}

/* HUD */
#score{
  position:absolute;
  top:10px;
  left:20px;
  font-size:1.6rem;
  font-weight:700;
  color:#fff;
  z-index:5;
}
#bananaCount{
  position:absolute;
  top:42px;
  left:20px;
  font-size:1.3rem;
  color:#ffe066;
  z-index:5;
  display:flex;
  align-items:center;
  gap:6px;
}
#bananaCount img{
  width:26px;
  height:auto;
}

#hearts{
  position:absolute;
  top:15px;
  right:20px;
  font-size:1.6rem;
  z-index:5;
}

/* PAUSE */
#pauseBtn{
  position:absolute;
  top:12px;
  left:50%;
  transform:translateX(-50%);
  font-size:1.8rem;
  color:#fff;
  cursor:pointer;
  z-index:6;
  display:none;
}

/* DEATH SCREEN */
#deathScreen{
  position:absolute;
  left:0;
  top:100vh;
  width:100%;
  height:100vh;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  background:#3aa0ff;
}

#deathGround{
  position:absolute;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  height:min(45vh,420px);
  background-image:url('images/dead gor.png');
  background-size:contain;
  background-position:bottom center;
  background-repeat:no-repeat;
  z-index:2;
}

#deathText{
  position:absolute;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  text-align:center;
  z-index:3;
}
#deathText h1{
  font-size:2.2rem;
  margin-bottom:10px;
}
#deathText p{
  font-size:1.3rem;
  margin:4px 0;
}

#restartBtn{
  margin-top:16px;
  padding:8px 16px;
  background:rgba(0,0,0,0.7);
  color:#fff;
  border:2px solid #fff;
  border-radius:4px;
  cursor:pointer;
}

/* SHOP BUTTON */
#shopButton{
  position:absolute;
  bottom:18px;
  right:18px;
  width:70px;
  height:70px;
  cursor:pointer;
  z-index:4;
  pointer-events:auto;
}

/* SHOP OVERLAY */
#shopOverlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9;
}

#shopPanel{
  background:#111;
  border:2px solid #444;
  border-radius:10px;
  padding:16px 20px;
  width:min(90vw,420px);
  color:#fff;
  text-align:center;
  position:relative;
}

#shopTitle{
  font-size:1.6rem;
  margin-bottom:10px;
}

#shopSkinImage{
  width:180px;
  height:auto;
  display:block;
  margin:0 auto 10px auto;
}

#shopInfo{
  margin-bottom:10px;
  font-size:1.1rem;
}

.shop-arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:32px;
  height:32px;
  border-radius:4px;
  border:2px solid #fff;
  background:#000;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:1.2rem;
}
#shopPrev{left:10px;}
#shopNext{right:10px;}

#shopActionBtn{
  margin-top:6px;
  padding:6px 14px;
  border-radius:4px;
  border:2px solid #fff;
  background:#222;
  color:#fff;
  cursor:pointer;
}

#shopLock{
  margin-top:4px;
  font-size:1.1rem;
}

#shopClose{
  position:absolute;
  top:6px;
  right:8px;
  cursor:pointer;
  font-size:1.1rem;
  color:#aaa;
}
</style>
</head>
<body>

<div id="scene">
  <div id="overlay">
    <div>
      <div id="overlayText">Survive the skies.</div>
      <div id="overlayHint">Tap / click / space to start</div>
    </div>
  </div>

  <div id="gameLayer">
    <div id="worldStack">

      <div id="gameWorld">
        <div id="score">Score: 0</div>

        <div id="bananaCount">
          <img src="images/bbb-removebg-preview.png">
          <span id="bananaText">Bananas: 0</span>
        </div>

        <div id="hearts">❤️❤️❤️</div>

        <div id="pauseBtn" class="ui">
          <i class="fa-solid fa-pause" style="color:rgb(30,48,80);"></i>
        </div>

        <img id="player" src="images/gor2-removebg-preview.png">

        <img id="megaWaveBanner" src="images/meg-removebg-preview.png">
      </div>

      <div id="deathScreen">
        <div id="deathText">
          <h1>YOU DIED</h1>
          <p id="scoreLine">Score: 0</p>
          <p id="bestScoreLine">Best Score: 0</p>
          <p id="bananaLine">Bananas: 0</p>
          <button id="restartBtn" class="ui">Go again</button>
        </div>

        <div id="deathGround"></div>

        <img id="shopButton" class="ui" src="images/shop-removebg-preview.png">
      </div>

    </div>
  </div>

  <!-- SHOP -->
  <div id="shopOverlay">
    <div id="shopPanel">
      <div id="shopClose" class="ui">X</div>
      <div id="shopTitle">Gorilla Skins</div>

      <div id="shopPrev" class="shop-arrow ui">&lt;</div>
      <div id="shopNext" class="shop-arrow ui">&gt;</div>

      <img id="shopSkinImage" src="">
      <div id="shopInfo"></div>
      <div id="shopLock"></div>
      <button id="shopActionBtn" class="ui"></button>
    </div>
  </div>

</div>

<script>
const overlay=document.getElementById("overlay");
const gameLayer=document.getElementById("gameLayer");
const worldStack=document.getElementById("worldStack");
const gameWorld=document.getElementById("gameWorld");
const player=document.getElementById("player");
const scoreEl=document.getElementById("score");
const heartsEl=document.getElementById("hearts");
const restartBtn=document.getElementById("restartBtn");
const pauseBtn=document.getElementById("pauseBtn");
const scoreLine=document.getElementById("scoreLine");
const bestScoreLine=document.getElementById("bestScoreLine");
const bananaText=document.getElementById("bananaText");
const bananaLine=document.getElementById("bananaLine");
const megaWaveBanner=document.getElementById("megaWaveBanner");
const shopButton=document.getElementById("shopButton");
const shopOverlay=document.getElementById("shopOverlay");
const shopSkinImage=document.getElementById("shopSkinImage");
const shopInfo=document.getElementById("shopInfo");
const shopLock=document.getElementById("shopLock");
const shopActionBtn=document.getElementById("shopActionBtn");
const shopPrev=document.getElementById("shopPrev");
const shopNext=document.getElementById("shopNext");
const shopClose=document.getElementById("shopClose");

const isPC=!/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

if (!isPC) {
  player.style.width = "70px";
  player.style.left = "90px";
} else {
  player.style.width = "100px";
  player.style.left = "150px";
}

let y=window.innerHeight/2;
let velocity=0;

let baseFlapStrengthPC=-8.0;
let baseFlapStrengthMobile=-6.6;
let baseGravityPC=0.205;
let baseGravityMobile=0.25;

let flapStrength = isPC ? baseFlapStrengthPC : baseFlapStrengthMobile;
let gravity = isPC ? baseGravityPC : baseGravityMobile;

let started=false,running=false,paused=false;
let planes=[];
let bananas=[];
let planeSpawnTimer=0,safeFrames=0,score=0,scoreTimer=0,lives=3;
let middleTimer=0,diveFrames=0;
let bananaSpawnTimer=0;

let bestScore=parseInt(localStorage.getItem("vg_best_score")||"0",10);
let bananasTotal=parseInt(localStorage.getItem("vg_bananas")||"0",10);
bananaText.textContent="Bananas: "+bananasTotal;

let comboCount=0;
let lastGapFrame=0;
let frameCounter=0;

let planePassCount=0;
let inMegaWave=false;
let megaWaveActive=false;
let firstMegaDone=false;
let lastMegaScoreTrigger=0;

const SKINS=[
  {
    id:"vanilla",
    name:"Vanilla Gorilla",
    price:0,
    unlocked:true,
    icon:"images/goggg-removebg-preview.png",
    fly:"images/gor2-removebg-preview.png",
    fall:"images/gor3-removebg-preview.png",
    dead:"images/dead gor.png"
  },
  {
    id:"spider",
    name:"Spider Gorilla",
    price:100,
    unlocked:false,
    icon:"images/spider-removebg-preview.png",
    fly:"images/flyspider-removebg-preview.png",
    fall:"images/flyspider-removebg-preview.png",
    dead:"images/spider-removebg-preview.png"
  }
];

let ownedSkinsJSON=localStorage.getItem("vg_owned_skins");
let ownedSkins=ownedSkinsJSON?JSON.parse(ownedSkinsJSON):["vanilla"];
SKINS.forEach(s=>{ if(ownedSkins.includes(s.id)) s.unlocked=true; });

let currentSkinId=localStorage.getItem("vg_current_skin")||"vanilla";
if(!ownedSkins.includes(currentSkinId)) currentSkinId="vanilla";

function getCurrentSkin(){
  return SKINS.find(s=>s.id===currentSkinId) || SKINS[0];
}

let shopIndex=0;

function applyCurrentSkin(falling=false,dead=false){
  const skin=getCurrentSkin();
  if(dead){
    player.src=skin.dead;
  }else if(falling){
    player.src=skin.fall;
    if(skin.id==="spider"){
      player.style.transformOrigin="center center";
    }
  }else{
    player.src=skin.fly;
  }
}

applyCurrentSkin(false,false);

document.addEventListener("keydown",e=>{
  if(["Space","ArrowUp","KeyW"].includes(e.code)) flap(e);
});
document.addEventListener("mousedown",e=>flap(e));
document.addEventListener("touchstart",e=>{e.preventDefault();flap(e);});

function flap(e){
  if(e && e.target && e.target.classList && e.target.classList.contains("ui")) return;

  if(!running){
    startGameplay();
    return;
  }
  if(paused)return;

  started=true;
  velocity=flapStrength;
}

function updateHearts(){
  heartsEl.textContent="❤️".repeat(lives);
}

function flashBonus(text,color="yellow"){
  const b=document.createElement("div");
  b.textContent=text;
  b.style.position="absolute";
  b.style.left="180px";
  b.style.top=(y-40)+"px";
  b.style.color=color;
  b.style.fontSize="1.4rem";
  b.style.fontWeight="700";
  b.style.zIndex="10";
  b.style.opacity="1";
  b.style.transition="1s";
  gameWorld.appendChild(b);
  setTimeout(()=>{b.style.opacity="0";b.style.top=(y-80)+"px";},50);
  setTimeout(()=>b.remove(),1100);
}

function screenShake(){
  document.body.style.transition="0s";
  document.body.style.transform="translate(8px)";
  setTimeout(()=>document.body.style.transform="translate(-8px)",60);
  setTimeout(()=>document.body.style.transform="translate(0)",120);
}

function spawnPlane(isMega=false){
  let maxPlanes=isMega?14:Math.min(7,2+Math.floor(safeFrames/350));
  if(planes.length>=maxPlanes)return;

  const plane=document.createElement("img");
  plane.src="images/plane-removebg-preview.png";
  plane.className="plane";

  const minY=0;
  const maxY=window.innerHeight-220;
  let yPos=Math.random()*(maxY-minY)+minY;

  plane.style.top=yPos+"px";
  plane.style.left=window.innerWidth+"px";
  plane.style.width = isPC ? "120px" : "90px";

  let baseSpeed;
  if(isMega){
    baseSpeed=3+Math.random()*5;
  }else{
    baseSpeed=2.4+Math.random()*2.6+Math.min(3.0,safeFrames/300);
  }

  if(!isPC) baseSpeed*=0.7;
  else baseSpeed*=1.18;

  plane.dataset.speed=baseSpeed;

  gameWorld.appendChild(plane);
  planes.push(plane);
}

function spawnBanana(){
  const banana=document.createElement("img");
  banana.src="images/bbb-removebg-preview.png";
  banana.className="banana";

  const minY=60;
  const maxY=window.innerHeight-240;
  let yPos=Math.random()*(maxY-minY)+minY;

  banana.style.top=yPos+"px";
  banana.style.left=window.innerWidth+"px";

  let speed=2.6+Math.random()*1.2+Math.min(2.0,safeFrames/350);
  if(!isPC) speed*=0.8;
  banana.dataset.speed=speed;

  gameWorld.appendChild(banana);
  bananas.push(banana);
}

function hit(a,b){
  const ar=a.getBoundingClientRect(),br=b.getBoundingClientRect();
  const shrink=26;
  return !(ar.right-shrink<br.left+shrink||
           ar.left+shrink>br.right-shrink||
           ar.bottom-shrink<br.top+shrink||
           ar.top+shrink>br.bottom-shrink);
}

function hitBanana(a,b){
  const ar=a.getBoundingClientRect(),br=b.getBoundingClientRect();
  const shrink=10;
  return !(ar.right-shrink<br.left+shrink||
           ar.left+shrink>br.right-shrink||
           ar.bottom-shrink<br.top+shrink||
           ar.top+shrink>br.bottom-shrink);
}

function updateScoreDisplay(){
  if(score>bestScore){
    scoreEl.style.color="yellow";
    scoreEl.innerHTML='<i class="fa-solid fa-crown" style="color:rgb(255,212,59);margin-right:6px;"></i> Score: '+score;
  }else{
    scoreEl.style.color="#fff";
    scoreEl.textContent="Score: "+score;
  }
}

function startMegaWave(){
  if(megaWaveActive) return;
  megaWaveActive=true;
  inMegaWave=true;

  megaWaveBanner.style.display="block";
  megaWaveBanner.classList.add("mega-shake");

  let originalFlap=flapStrength;
  let originalGrav=gravity;

  flapStrength = originalFlap * 1.2;
  gravity = originalGrav * 1.2;

  for(let i=0;i<12;i++){
    setTimeout(()=>spawnPlane(true),i*120);
  }

  setTimeout(()=>{
    megaWaveBanner.style.display="none";
    megaWaveBanner.classList.remove("mega-shake");
    flapStrength = originalFlap;
    gravity = originalGrav;
    inMegaWave=false;
    megaWaveActive=false;
  },3000);
}

function gameLoop(){
  if(!running||paused)return;

  frameCounter++;
  safeFrames++;

  velocity+=gravity;
  y+=velocity;

  let gorillaHeight = player.offsetHeight || 70;
  if(y<0){
    y=0;
    velocity=0;
  }
  if(y>window.innerHeight-gorillaHeight+10){
    y=window.innerHeight-gorillaHeight+10;
    triggerDeath();
    return;
  }

  player.style.top=y+"px";

  let tiltVel=velocity*0.65;
  let angle=tiltVel*3.1;
  angle=Math.max(-32,Math.min(32,angle));
  player.style.transform='translateY(-50%) rotate('+angle+'deg)';

  if(velocity>4){
    diveFrames++;
    if(diveFrames>12){
      applyCurrentSkin(true,false);
    }
  }else{
    diveFrames=0;
    applyCurrentSkin(false,false);
  }

  if(started){
    const midTop=window.innerHeight*0.40;
    const midBottom=window.innerHeight*0.60;

    if(y>midTop && y<midBottom){
      middleTimer++;
      if(middleTimer>=60){
        score+=2;
        flashBonus("CENTER +2");
        middleTimer=0;
        updateScoreDisplay();
      }
    }else{
      middleTimer=0;
    }
  }

  if(started && safeFrames>120 && !inMegaWave){
    planeSpawnTimer++;
    if(planeSpawnTimer>Math.max(50,140-safeFrames/10)){
      planeSpawnTimer=0;
      spawnPlane(false);
    }
  }

  if(started && safeFrames>200){
    bananaSpawnTimer++;
    if(bananaSpawnTimer>120){
      bananaSpawnTimer=0;
      if(Math.random()<0.7) spawnBanana();
    }
  }

  if(frameCounter-lastGapFrame>180){
    comboCount=0;
  }

  for(let i=planes.length-1;i>=0;i--){
    const p=planes[i];
    let left=parseFloat(p.style.left)-parseFloat(p.dataset.speed);
    p.style.left=left+"px";

    if(left<150 && left>20 && !p.bonusGiven){
      p.bonusGiven=true;

      const gorCenter=y;
      const planeCenter=parseFloat(p.style.top)+60;
      const gap=Math.abs(gorCenter-planeCenter);

      let gotGood=false;

      if(gap<40){
        score+=10;
        flashBonus("NARROW FIT +10","orange");
        gotGood=true;
      }else if(gap<100){
        score+=5;
        flashBonus("GOOD GAP +5","yellow");
        gotGood=true;
      }else if(gap<160){
        score+=2;
        flashBonus("NEAR MISS +2","#9cf");
        gotGood=true;
      }

      if(gotGood){
        comboCount++;
        lastGapFrame=frameCounter;

        if(comboCount===3){
          score+=5;
          flashBonus("COMBO x3 +5","lime");
        }else if(comboCount===5){
          score+=10;
          flashBonus("COMBO x5 +10","lime");
        }
        updateScoreDisplay();
      }else{
        comboCount=0;
      }

      planePassCount++;
    }

    if(left<-250){
      p.remove();
      planes.splice(i,1);
      continue;
    }

    if(hit(player,p)){
      screenShake();
      lives--;
      updateHearts();
      p.remove();
      planes.splice(i,1);
      comboCount=0;
      if(lives<=0){triggerDeath();return;}
    }
  }

  for(let i=bananas.length-1;i>=0;i--){
    const b=bananas[i];
    let left=parseFloat(b.style.left)-parseFloat(b.dataset.speed);
    b.style.left=left+"px";

    if(left<-200){
      b.remove();
      bananas.splice(i,1);
      continue;
    }

    if(hitBanana(player,b)){
      bananasTotal++;
      localStorage.setItem("vg_bananas",String(bananasTotal));
      bananaText.textContent="Bananas: "+bananasTotal;
      flashBonus("+1 banana","gold");
      b.remove();
      bananas.splice(i,1);
    }
  }

  if(started){
    scoreTimer++;
    if(scoreTimer>=14){
      scoreTimer=0;
      score++;
      updateScoreDisplay();

      if(!firstMegaDone && score>=125){
        firstMegaDone=true;
        lastMegaScoreTrigger=125;
        startMegaWave();
      }else if(firstMegaDone && score>=125 && (score-125)%110===0 && score!==lastMegaScoreTrigger){
        if(Math.random()<0.5){
          lastMegaScoreTrigger=score;
          startMegaWave();
        }
      }
    }
  }

  requestAnimationFrame(gameLoop);
}

function triggerDeath(){
  if(!running)return;
  running=false;
  paused=false;

  screenShake();

  applyCurrentSkin(true,false);

  let dv=0;
  function fall(){
    dv+=0.9;y+=dv;
    player.style.top=y+"px";
    player.style.transform='translateY(-50%) rotate(15deg)';
    if(y<window.innerHeight+160)requestAnimationFrame(fall);
    else showDeathScreen();
  }
  fall();
}

function showDeathScreen(){
  if(score>bestScore){
    bestScore=score;
    localStorage.setItem("vg_best_score",String(bestScore));
  }

  const msgs=["You died L bozo","How r u so bad","My grandma can play better than u"];
  document.querySelector("#deathText h1").textContent=msgs[Math.floor(Math.random()*msgs.length)];

  scoreLine.textContent="Score: "+score;
  bestScoreLine.textContent="Best Score: "+bestScore;
  bananaLine.textContent="Bananas: "+bananasTotal;

  player.style.display="none";

  worldStack.style.transition="transform 2s ease-in";
  worldStack.style.transform="translateY(-100vh)";
}

restartBtn.onclick=()=>{
  worldStack.style.transition="transform 1s ease-out";
  worldStack.style.transform="translateY(0)";

  setTimeout(()=>{
    planes.forEach(p=>p.remove());planes=[];
    bananas.forEach(b=>b.remove());bananas=[];
    y=window.innerHeight/2;
    velocity=0;
    started=false;
    running=false;
    paused=false;
    score=0;
    scoreTimer=0;
    safeFrames=0;
    lives=3;
    middleTimer=0;
    diveFrames=0;
    bananaSpawnTimer=0;
    comboCount=0;
    lastGapFrame=0;
    frameCounter=0;
    planePassCount=0;
    inMegaWave=false;
    megaWaveActive=false;
    firstMegaDone=false;
    lastMegaScoreTrigger=0;

    updateHearts();

    applyCurrentSkin(false,false);
    player.style.display="block";
    player.style.top=y+"px";
    player.style.transform="translateY(-50%) rotate(0deg)";
    if(!isPC){
      player.style.width="70px";
      player.style.left="90px";
    }else{
      player.style.width="100px";
      player.style.left="150px";
    }

    scoreEl.style.color="#fff";
    scoreEl.textContent="Score: 0";

    pauseBtn.style.display="none";

    overlay.style.opacity="1";
    overlay.style.pointerEvents="auto";
  },900);
};

pauseBtn.onclick=()=>{
  if(!running)return;
  paused=!paused;
  pauseBtn.innerHTML=paused
    ? '<i class="fa-solid fa-play" style="color: rgb(30, 48, 80);"></i>'
    : '<i class="fa-solid fa-pause" style="color: rgb(30, 48, 80);"></i>';
  if(!paused) requestAnimationFrame(gameLoop);
};

function startGameplay(){
  overlay.style.opacity="0";
  overlay.style.pointerEvents="none";

  started=false;
  running=true;
  paused=false;
  y=window.innerHeight/2;
  velocity=0;
  score=0;
  scoreTimer=0;
  safeFrames=0;
  lives=3;
  middleTimer=0;
  diveFrames=0;
  bananaSpawnTimer=0;
  comboCount=0;
  lastGapFrame=0;
  frameCounter=0;
  planePassCount=0;
  inMegaWave=false;
  megaWaveActive=false;
  firstMegaDone=false;
  lastMegaScoreTrigger=0;

  updateHearts();
  planes.forEach(p=>p.remove());planes=[];
  bananas.forEach(b=>b.remove());bananas=[];
  scoreEl.style.color="#fff";
  scoreEl.textContent="Score: 0";

  applyCurrentSkin(false,false);
  player.style.display="block";
  player.style.top=y+"px";
  player.style.transform="translateY(-50%) rotate(0deg)";
  if(!isPC){
    player.style.width="70px";
    player.style.left="90px";
  }else{
    player.style.width="100px";
    player.style.left="150px";
  }

  pauseBtn.style.display="block";
  pauseBtn.innerHTML='<i class="fa-solid fa-pause" style="color: rgb(30, 48, 80);"></i>';

  requestAnimationFrame(gameLoop);
}

/* SHOP LOGIC */
function updateShopUI(){
  const skin=SKINS[shopIndex];
  shopSkinImage.src=skin.icon;
  shopInfo.textContent=skin.name+" - "+skin.price+" bananas";
  if(skin.unlocked){
    shopLock.textContent="";
    if(currentSkinId===skin.id){
      shopActionBtn.textContent="Equipped";
      shopActionBtn.disabled=true;
    }else{
      shopActionBtn.textContent="Equip";
      shopActionBtn.disabled=false;
    }
  }else{
    shopLock.textContent="Locked";
    shopActionBtn.textContent="Buy";
    shopActionBtn.disabled=false;
  }
}

shopButton.onclick=()=>{
  shopOverlay.style.display="flex";
  updateShopUI();
};

shopClose.onclick=()=>{
  shopOverlay.style.display="none";
};

shopPrev.onclick=()=>{
  shopIndex=(shopIndex-1+SKINS.length)%SKINS.length;
  updateShopUI();
};

shopNext.onclick=()=>{
  shopIndex=(shopIndex+1)%SKINS.length;
  updateShopUI();
};

shopActionBtn.onclick=()=>{
  const skin=SKINS[shopIndex];
  if(skin.unlocked){
    currentSkinId=skin.id;
    localStorage.setItem("vg_current_skin",currentSkinId);
    applyCurrentSkin(false,false);
    updateShopUI();
  }else{
    if(bananasTotal>=skin.price){
      bananasTotal-=skin.price;
      bananaText.textContent="Bananas: "+bananasTotal;
      localStorage.setItem("vg_bananas",String(bananasTotal));
      skin.unlocked=true;
      if(!ownedSkins.includes(skin.id)){
        ownedSkins.push(skin.id);
        localStorage.setItem("vg_owned_skins",JSON.stringify(ownedSkins));
      }
      updateShopUI();
    }
  }
};
</script>
