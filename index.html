<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanilla Gorilla</title>
<link rel="icon" type="image/png" href="images/dead gor.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:sans-serif;-webkit-tap-highlight-color:transparent;}
img{user-select:none;-webkit-user-drag:none;pointer-events:none;}
#scene{position:relative;width:100vw;height:100vh;overflow:hidden;background:#3aa0ff;}
#gorillaIntro{position:absolute;width:260px;bottom:-220px;left:-220px;transform:rotate(25deg);opacity:0;animation:flyIntro 4s ease-out forwards;animation-delay:0.3s;}
@keyframes flyIntro{0%{bottom:-220px;left:-220px;opacity:1;}100%{bottom:100vh;left:100vw;opacity:0;}}
#vanillaText{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.1) rotate(-180deg);font-size:3.2rem;color:#fff;opacity:0;animation:vanillaSpin 2.5s ease-out forwards;animation-delay:2s;}
@keyframes vanillaSpin{0%{opacity:0;transform:translate(-50%,-50%) scale(0.1) rotate(-180deg);}30%{opacity:1;transform:translate(-50%,-50%) scale(1.1) rotate(10deg);}60%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0deg);}100%{opacity:0;transform:translate(-50%,-50%) scale(0.9) rotate(20deg);}}
#overlay{position:absolute;inset:0;background:#000;display:flex;align-items:center;justify-content:center;text-align:center;color:#fff;opacity:0;transition:opacity 1s;z-index:5;}
#storyText{max-width:80vw;font-size:1.6rem;}
#skipBtn{position:absolute;bottom:15px;right:15px;padding:8px 14px;background:rgba(0,0,0,0.7);color:#fff;border:2px solid #fff;border-radius:4px;cursor:pointer;z-index:6;}
#gameLayer{position:absolute;inset:0;background:#3aa0ff;display:none;overflow:hidden;z-index:3;}
#worldStack{position:absolute;left:0;top:0;width:100%;height:200vh;transition:transform 0s;}
#gameWorld{position:absolute;left:0;top:0;width:100%;height:100vh;}
#player{position:absolute;width:110px;left:150px;top:50%;transform:translateY(-50%) rotate(0deg);transition:transform 0.08s linear;z-index:4;}
.plane{position:absolute;width:140px;z-index:3;}
#score{position:absolute;top:15px;left:20px;font-size:1.6rem;font-weight:700;color:#fff;z-index:5;}
#hearts{position:absolute;top:15px;right:20px;font-size:1.6rem;z-index:5;}
#deathScreen{position:absolute;left:0;top:100vh;width:100%;height:100vh;display:flex;align-items:flex-end;justify-content:center;background:#3aa0ff;}
#deathGround{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;height:400px;background-image:url('images/dead gor.png');background-size:contain;background-position:bottom center;background-repeat:no-repeat;z-index:2;}
#deathText{position:absolute;top:60px;left:50%;transform:translateX(-50%);color:#fff;text-align:center;z-index:3;}
#deathText h1{font-size:2.2rem;margin-bottom:10px;}
#deathText p{font-size:1.3rem;margin:4px 0;}
#restartBtn{margin-top:16px;padding:8px 16px;background:rgba(0,0,0,0.7);color:#fff;border:2px solid #fff;border-radius:4px;cursor:pointer;}
</style>
</head>
<body>
<div id="scene">
<img id="gorillaIntro" src="images/gor1-removebg-preview.png">
<div id="vanillaText">VANILLA GORILLA</div>
<div id="overlay"><div id="storyText"></div></div>
<button id="skipBtn">Skip cutscene</button>
<div id="gameLayer">
<div id="worldStack">
<div id="gameWorld">
<div id="score">Score: 0</div>
<div id="hearts">❤️❤️❤️</div>
<img id="player" src="images/gor2-removebg-preview.png">
</div>
<div id="deathScreen">
<div id="deathText">
<h1>YOU DIED</h1>
<p id="scoreLine">Score: 0</p>
<p id="bestScoreLine">Best Score: 0</p>
<button id="restartBtn">Go again</button>
</div>
<div id="deathGround"></div>
</div>
</div>
</div>
</div>

<script>
const overlay=document.getElementById("overlay");
const storyText=document.getElementById("storyText");
const skipBtn=document.getElementById("skipBtn");
const gameLayer=document.getElementById("gameLayer");
const worldStack=document.getElementById("worldStack");
const gameWorld=document.getElementById("gameWorld");
const player=document.getElementById("player");
const scoreEl=document.getElementById("score");
const heartsEl=document.getElementById("hearts");
const deathTitle=document.getElementById("deathText").querySelector("h1");
const scoreLine=document.getElementById("scoreLine");
const bestScoreLine=document.getElementById("bestScoreLine");
const restartBtn=document.getElementById("restartBtn");

let y=window.innerHeight/2;
let velocity=0;
let gravity=0.27;
const flapStrength=-6.5;
let started=false,running=false;
let planes=[];
let planeSpawnTimer=0,safeFrames=0,score=0,scoreTimer=0,lives=3;
let bestScore=parseInt(localStorage.getItem("vg_best_score")||"0",10);
let seenStory=localStorage.getItem("vg_seen_intro");

// STORY
function fadeStory(t){storyText.style.opacity="0";setTimeout(()=>{storyText.textContent=t;storyText.style.opacity="1";},250);}
function playStory(){
overlay.style.display="flex"; overlay.style.opacity="1";
setTimeout(()=>fadeStory("The year is 2067 — 80 years since Hitler won the war."),1000);
setTimeout(()=>fadeStory("You are the British Rebellion’s last hope."),4000);
setTimeout(()=>{overlay.style.opacity="0";setTimeout(()=>{overlay.style.display="none";startGameplay();},800);},7000);
localStorage.setItem("vg_seen_intro","1");
}
skipBtn.onclick=()=>{overlay.style.display="none"; skipBtn.style.display="none"; startGameplay();};

// INPUT
document.addEventListener("keydown",e=>{if(e.code==="Space"||e.code==="ArrowUp") flap();});
document.addEventListener("mousedown",flap);
document.addEventListener("touchstart",e=>{e.preventDefault(); flap();});
function flap(){if(!running) return; started=true; velocity=flapStrength;}

// HEARTS
function updateHearts(){heartsEl.textContent="❤️".repeat(lives);}

// PLANES
function spawnPlane(){
let maxPlanes=Math.min(6,2+Math.floor(safeFrames/400));
if(planes.length>=maxPlanes) return;
const plane=document.createElement("img"); plane.src="images/plane-removebg-preview.png"; plane.className="plane";
let minY=70,maxY=window.innerHeight-230;
let yPos=Math.random()*(maxY-minY)+minY;
if(planes.length>0){const last=parseFloat(planes[planes.length-1].style.top);if(Math.abs(yPos-last)<160)yPos+=200;}
plane.style.top=yPos+"px"; plane.style.left=window.innerWidth+"px";
plane.dataset.speed=(0.9+Math.random()*0.6+Math.min(1.2,safeFrames/600));
gameWorld.appendChild(plane); planes.push(plane);
}

function hit(a,b){const ar=a.getBoundingClientRect(),br=b.getBoundingClientRect();const shrink=28;return!(ar.right-shrink<br.left+shrink||ar.left+shrink>br.right-shrink||ar.bottom-shrink<br.top+shrink||ar
