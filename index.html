<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanilla Gorilla</title>
<link rel="icon" type="image/png" href="images/dead gor.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{
  margin:0;padding:0;box-sizing:border-box;
  user-select:none;-webkit-user-select:none;
}
body{background:#000;overflow:hidden;font-family:sans-serif;-webkit-tap-highlight-color:transparent;}
img{user-select:none;-webkit-user-drag:none;pointer-events:none;}

#scene{position:relative;width:100vw;height:100vh;overflow:hidden;background:#3aa0ff;}

#gorillaIntro{position:absolute;width:260px;bottom:-220px;left:-220px;transform:rotate(25deg);opacity:0;
animation:flyIntro 4s ease-out forwards;animation-delay:0.3s;}
@keyframes flyIntro{
  0%{bottom:-220px;left:-220px;opacity:1;}
  100%{bottom:100vh;left:100vw;opacity:0;}
}

#vanillaText{position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%) scale(0.1) rotate(-180deg);
font-size:3.2rem;color:#fff;opacity:0;
animation:vanillaSpin 2.5s ease-out forwards;animation-delay:2s;}
@keyframes vanillaSpin{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.1) rotate(-180deg);}
  30%{opacity:1;transform:translate(-50%,-50%) scale(1.1) rotate(10deg);}
  60%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0deg);}
  100%{opacity:0;transform:translate(-50%,-50%) scale(0.9) rotate(20deg);}
}

#overlay{
  position:absolute;inset:0;background:#000;
  display:flex;align-items:center;justify-content:center;
  text-align:center;color:#fff;font-size:1.6rem;
  opacity:0;pointer-events:none;transition:opacity 0.6s;
  z-index:5;
}

#skipBtn{
  position:absolute;bottom:15px;right:15px;
  padding:8px 14px;background:rgba(0,0,0,0.7);
  color:#fff;border:2px solid #fff;border-radius:4px;
  cursor:pointer;z-index:6;display:none;
}

#gameLayer{position:absolute;inset:0;background:#3aa0ff;display:none;overflow:hidden;z-index:3;}
#worldStack{position:absolute;left:0;top:0;width:100%;height:200vh;transition:transform 0s;}
#gameWorld{position:absolute;left:0;top:0;width:100%;height:100vh;overflow:hidden;}

#player{
  position:absolute;width:110px;left:150px;top:50%;
  transform:translateY(-50%) rotate(0deg);
  transition:transform 0.06s linear;z-index:4;
}

.plane{position:absolute;width:140px;z-index:3;}
.banana{position:absolute;width:60px;z-index:3;}

#ground{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:180px;
  background:#1f7a2e;
  z-index:1;
}

#score{position:absolute;top:10px;left:20px;font-size:1.6rem;font-weight:700;color:#fff;z-index:5;}
#bananaCount{position:absolute;top:42px;left:20px;font-size:1.3rem;color:#ffe066;z-index:5;display:flex;align-items:center;gap:6px;}
#bananaCount img{width:26px;height:auto;}

#hearts{position:absolute;top:15px;right:20px;font-size:1.6rem;z-index:5;}

#pauseBtn{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  font-size:1.8rem;color:#fff;cursor:pointer;z-index:6;display:none;
}

#deathScreen{
  position:absolute;left:0;top:100vh;width:100%;height:100vh;
  display:flex;align-items:flex-end;justify-content:center;background:#3aa0ff;
}

#deathGround{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;height:min(45vh,420px);
  background-image:url('images/dead gor.png');
  background-size:contain;background-position:bottom center;background-repeat:no-repeat;
  z-index:2;
}

#deathText{
  position:absolute;top:60px;left:50%;transform:translateX(-50%);
  color:#fff;text-align:center;z-index:3;
}
#deathText h1{font-size:2.2rem;margin-bottom:10px;}
#deathText p{font-size:1.3rem;margin:4px 0;}

#restartBtn{
  margin-top:16px;padding:8px 16px;background:rgba(0,0,0,0.7);
  color:#fff;border:2px solid #fff;border-radius:4px;cursor:pointer;
}
</style>
</head>
<body>

<div id="scene">
  <img id="gorillaIntro" src="images/gor1-removebg-preview.png">
  <div id="vanillaText">VANILLA GORILLA</div>

  <div id="overlay">Survive the skies.</div>
  <button id="skipBtn">Skip</button>

  <div id="gameLayer">
    <div id="worldStack">

      <div id="gameWorld">
        <div id="score">Score: 0</div>
        <div id="bananaCount">
          <img src="images/bbb-removebg-preview.png" alt="">
          <span id="bananaText">Bananas: 0</span>
        </div>
        <div id="hearts">❤️❤️❤️</div>
        <div id="pauseBtn"><i class="fa-solid fa-pause" style="color: rgb(30, 48, 80);"></i></div>
        <img id="player" src="images/gor2-removebg-preview.png">
        <div id="ground"></div>
      </div>

      <div id="deathScreen">
        <div id="deathText">
          <h1>YOU DIED</h1>
          <p id="scoreLine">Score: 0</p>
          <p id="bestScoreLine">Best Score: 0</p>
          <p id="bananaLine">Bananas: 0</p>
          <button id="restartBtn">Go again</button>
        </div>
        <div id="deathGround"></div>
      </div>

    </div>
  </div>
</div>

<script>
const overlay=document.getElementById("overlay");
const skipBtn=document.getElementById("skipBtn");
const gameLayer=document.getElementById("gameLayer");
const worldStack=document.getElementById("worldStack");
const gameWorld=document.getElementById("gameWorld");
const player=document.getElementById("player");
const scoreEl=document.getElementById("score");
const heartsEl=document.getElementById("hearts");
const restartBtn=document.getElementById("restartBtn");
const pauseBtn=document.getElementById("pauseBtn");
const scoreLine=document.getElementById("scoreLine");
const bestScoreLine=document.getElementById("bestScoreLine");
const bananaText=document.getElementById("bananaText");
const bananaLine=document.getElementById("bananaLine");

let y=window.innerHeight/2;
let velocity=0;
let gravity=0.24;
const flapStrength=-6.8;

let started=false,running=false,paused=false;
let planes=[];
let bananas=[];
let planeSpawnTimer=0,safeFrames=0,score=0,scoreTimer=0,lives=3;
let middleTimer=0,diveFrames=0;
let bananaSpawnTimer=0;

let bestScore=parseInt(localStorage.getItem("vg_best_score")||"0",10);
let bananasTotal=parseInt(localStorage.getItem("vg_bananas")||"0",10);

const isPC=!/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

bananaText.textContent="Bananas: "+bananasTotal;

document.addEventListener("keydown",e=>{
  if(["Space","ArrowUp","KeyW"].includes(e.code)) flap();
});
document.addEventListener("mousedown",flap);
document.addEventListener("touchstart",e=>{e.preventDefault();flap();});

function flap(){
  if(!running||paused)return;
  started=true;
  velocity=flapStrength;
}

function updateHearts(){heartsEl.textContent="❤️".repeat(lives);}

function flashBonus(text){
  const b=document.createElement("div");
  b.textContent=text;
  b.style.position="absolute";
  b.style.left="180px";
  b.style.top=(y-40)+"px";
  b.style.color="yellow";
  b.style.fontSize="1.4rem";
  b.style.fontWeight="700";
  b.style.zIndex="10";
  b.style.opacity="1";
  b.style.transition="1s";
  gameWorld.appendChild(b);
  setTimeout(()=>{b.style.opacity="0";b.style.top=(y-80)+"px";},50);
  setTimeout(()=>b.remove(),1100);
}

function spawnPlane(){
  let maxPlanes=Math.min(7,2+Math.floor(safeFrames/350));
  if(planes.length>=maxPlanes)return;

  const plane=document.createElement("img");
  plane.src="images/plane-removebg-preview.png";
  plane.className="plane";

  const minY=0;
  const maxY=window.innerHeight-220;
  let yPos=Math.random()*(maxY-minY)+minY;

  plane.style.top=yPos+"px";
  plane.style.left=window.innerWidth+"px";

  let baseSpeed=3.4+Math.random()*1.8+Math.min(3.0,safeFrames/280);
  if(isPC) baseSpeed*=1.1;
  plane.dataset.speed=baseSpeed;

  gameWorld.appendChild(plane);
  planes.push(plane);
}

function spawnBanana(){
  const banana=document.createElement("img");
  banana.src="images/bbb-removebg-preview.png";
  banana.className="banana";

  const minY=60;
  const maxY=window.innerHeight-240;
  let yPos=Math.random()*(maxY-minY)+minY;

  banana.style.top=yPos+"px";
  banana.style.left=window.innerWidth+"px";

  let speed=3.0+Math.random()*1.2+Math.min(2.0,safeFrames/350);
  if(isPC) speed*=1.05;
  banana.dataset.speed=speed;

  gameWorld.appendChild(banana);
  bananas.push(banana);
}

function hit(a,b){
  const ar=a.getBoundingClientRect(),br=b.getBoundingClientRect();
  const shrink=28;
  return !(ar.right-shrink<br.left+shrink||
           ar.left+shrink>br.right-shrink||
           ar.bottom-shrink<br.top+shrink||
           ar.top+shrink>br.bottom-shrink);
}

function hitBanana(a,b){
  const ar=a.getBoundingClientRect(),br=b.getBoundingClientRect();
  const shrink=10;
  return !(ar.right-shrink<br.left+shrink||
           ar.left+shrink>br.right-shrink||
           ar.bottom-shrink<br.top+shrink||
           ar.top+shrink>br.bottom-shrink);
}

function updateScoreDisplay(){
  if(score>bestScore){
    scoreEl.style.color="yellow";
    scoreEl.innerHTML=`<i class="fa-solid fa-crown" style="color:rgb(255,212,59);margin-right:6px;"></i> Score: ${score}`;
  }else{
    scoreEl.style.color="#fff";
    scoreEl.textContent="Score: "+score;
  }
}

function gameLoop(){
  if(!running||paused)return;

  safeFrames++;

  if(started){velocity+=gravity;y+=velocity;}

  if(y<0){y=0;velocity=0;}
  if(y>window.innerHeight-45){y=window.innerHeight-45;triggerDeath();return;}

  player.style.top=y+"px";

  let angle=velocity*2.4;
  if(angle>30)angle=30;
  if(angle<-30)angle=-30;
  player.style.transform=`translateY(-50%) rotate(${angle}deg)`;

  if(velocity>4){
    diveFrames++;
    if(diveFrames>20){
      player.src="images/gor3-removebg-preview.png";
      player.style.width="120px";
    }
  }else{
    diveFrames=0;
    player.src="images/gor2-removebg-preview.png";
    player.style.width="110px";
  }

  if(started){
    const midTop=window.innerHeight*0.40;
    const midBottom=window.innerHeight*0.60;

    if(y>midTop && y<midBottom){
      middleTimer++;
      if(middleTimer>=60){
        score+=2;
        flashBonus("CENTER +2");
        middleTimer=0;
        updateScoreDisplay();
      }
    }else{
      middleTimer=0;
    }
  }

  if(started && safeFrames>120){
    planeSpawnTimer++;
    if(planeSpawnTimer>Math.max(60,150-safeFrames/10)){
      planeSpawnTimer=0;
      spawnPlane();
    }
  }

  if(started && safeFrames>200){
    bananaSpawnTimer++;
    if(bananaSpawnTimer>120){
      bananaSpawnTimer=0;
      if(Math.random()<0.7) spawnBanana();
    }
  }

  for(let i=planes.length-1;i>=0;i--){
    const p=planes[i];
    let left=parseFloat(p.style.left)-parseFloat(p.dataset.speed);
    p.style.left=left+"px";

    if(left<150 && !p.bonusGiven){
      p.bonusGiven=true;

      const gorCenter=y;
      const planeCenter=parseFloat(p.style.top)+70;
      const gap=Math.abs(gorCenter-planeCenter);

      if(gap<45){
        score+=10;
        flashBonus("NARROW FIT +10");
        updateScoreDisplay();
      }else if(gap<110){
        score+=5;
        flashBonus("GOOD GAP +5");
        updateScoreDisplay();
      }
    }

    if(left<-250){
      p.remove();
      planes.splice(i,1);
      continue;
    }

    if(hit(player,p)){
      lives--;
      updateHearts();
      p.remove();
      planes.splice(i,1);
      if(lives<=0){triggerDeath();return;}
    }
  }

  for(let i=bananas.length-1;i>=0;i--){
    const b=bananas[i];
    let left=parseFloat(b.style.left)-parseFloat(b.dataset.speed);
    b.style.left=left+"px";

    if(left<-200){
      b.remove();
      bananas.splice(i,1);
      continue;
    }

    if(hitBanana(player,b)){
      bananasTotal++;
      localStorage.setItem("vg_bananas",String(bananasTotal));
      bananaText.textContent="Bananas: "+bananasTotal;
      flashBonus("+1 🍌");
      b.remove();
      bananas.splice(i,1);
    }
  }

  if(started){
    scoreTimer++;
    if(scoreTimer>=14){
      scoreTimer=0;
      score++;
      updateScoreDisplay();
    }
  }

  requestAnimationFrame(gameLoop);
}

function startGameplay(){
  overlay.style.opacity="0";
  overlay.style.pointerEvents="none";
  skipBtn.style.display="none";

  gameLayer.style.display="block";
  worldStack.style.transition="transform 0s";
  worldStack.style.transform="translateY(0)";

  started=false;running=true;paused=false;
  y=window.innerHeight/2;velocity=0;
  score=0;scoreTimer=0;safeFrames=0;lives=3;
  middleTimer=0;diveFrames=0;
  bananaSpawnTimer=0;

  updateHearts();
  planes.forEach(p=>p.remove());planes=[];
  bananas.forEach(b=>b.remove());bananas=[];
  scoreEl.style.color="#fff";
  scoreEl.textContent="Score: 0";

  player.src="images/gor2-removebg-preview.png";
  player.style.width="110px";
  player.style.top=y+"px";
  player.style.display="block";

  pauseBtn.style.display="block";
  pauseBtn.innerHTML='<i class="fa-solid fa-pause" style="color: rgb(30, 48, 80);"></i>';

  requestAnimationFrame(gameLoop);
}

function triggerDeath(){
  if(!running)return;
  running=false;
  paused=false;

  document.body.style.transition="0s";
  document.body.style.transform="translate(10px)";
  setTimeout(()=>document.body.style.transform="translate(-10px)",80);
  setTimeout(()=>document.body.style.transform="translate(0)",160);

  player.src="images/gor3-removebg-preview.png";
  player.style.width="120px";

  let dv=0;
  function fall(){
    dv+=0.9;y+=dv;
    player.style.top=y+"px";
    player.style.transform=`translateY(-50%) rotate(15deg)`;
    if(y<window.innerHeight+160)requestAnimationFrame(fall);
    else startScrollDown();
  }
  fall();
}

function startScrollDown(){
  if(score>bestScore){
    bestScore=score;
    localStorage.setItem("vg_best_score",String(bestScore));
  }

  const msgs=["You died L bozo","How r u so bad","My grandma can play better than u"];
  document.querySelector("#deathText h1").textContent=msgs[Math.floor(Math.random()*msgs.length)];

  scoreLine.textContent="Score: "+score;
  bestScoreLine.textContent="Best Score: "+bestScore;
  bananaLine.textContent="Bananas: "+bananasTotal;

  player.style.display="none";

  worldStack.style.transition="transform 2s ease-in";
  worldStack.style.transform="translateY(-100vh)";
}

restartBtn.onclick=()=>{
  worldStack.style.transition="transform 1s ease-out";
  worldStack.style.transform="translateY(0)";

  setTimeout(()=>{
    planes.forEach(p=>p.remove());planes=[];
    bananas.forEach(b=>b.remove());bananas=[];
    planes=[];bananas=[];
    y=window.innerHeight/2;
    velocity=0;
    started=false;
    running=true;
    paused=false;
    score=0;
    scoreTimer=0;
    safeFrames=0;
    lives=3;
    middleTimer=0;
    diveFrames=0;
    bananaSpawnTimer=0;

    updateHearts();

    player.src="images/gor2-removebg-preview.png";
    player.style.width="110px";
    player.style.display="block";
    player.style.top=y+"px";
    player.style.transform="translateY(-50%) rotate(0deg)";

    scoreEl.style.color="#fff";
    scoreEl.textContent="Score: 0";

    pauseBtn.style.display="block";
    pauseBtn.innerHTML='<i class="fa-solid fa-pause" style="color: rgb(30, 48, 80);"></i>';

    requestAnimationFrame(gameLoop);

    setTimeout(()=>{worldStack.style.transition="transform 2s ease-in";},50);
  },900);
};

pauseBtn.onclick=()=>{
  if(!running)return;
  paused=!paused;
  pauseBtn.innerHTML=paused
    ? '<i class="fa-solid fa-play" style="color: rgb(30, 48, 80);"></i>'
    : '<i class="fa-solid fa-pause" style="color: rgb(30, 48, 80);"></i>';
  if(!paused) requestAnimationFrame(gameLoop);
};

function showCutscene(){
  overlay.style.opacity="1";
  overlay.style.pointerEvents="auto";
  skipBtn.style.display="block";
  setTimeout(startGameplay,4000);
}

skipBtn.onclick=()=>{
  if(overlay.style.opacity==="1") startGameplay();
};

setTimeout(showCutscene,4500);
</script>
</body>
</html>
