<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vanilla Gorilla</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    *:focus { outline: none; }
    body {
      background: #000;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    img {
      user-select: none;
      -webkit-user-drag: none;
      image-rendering: crisp-edges;
      object-fit: contain;
      pointer-events: none;
      display: block;
    }

    #scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    /* INTRO */
    #gorillaIntro {
      position: absolute;
      width: 300px;
      bottom: -250px;
      left: -250px;
      transform: rotate(25deg);
      opacity: 0;
      animation: flyIntro 4s ease-out forwards;
      animation-delay: 0.3s;
      filter: hue-rotate(200deg); /* blue tint */
    }
    @keyframes flyIntro {
      0% { bottom: -250px; left: -250px; opacity: 1; transform: rotate(25deg); }
      50% { opacity: 1; }
      100% { bottom: 100vh; left: 100vw; opacity: 0; transform: rotate(25deg); }
    }

    #vanillaText {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.1) rotate(-180deg);
      font-size: 3.5rem;
      letter-spacing: 0.2em;
      color: #fff;
      opacity: 0;
      animation: vanillaSpin 2.5s ease-out forwards;
      animation-delay: 2s;
    }
    @keyframes vanillaSpin {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.1) rotate(-180deg); }
      30% { opacity: 1; transform: translate(-50%, -50%) scale(1.1) rotate(10deg); }
      60% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9) rotate(20deg); }
    }

    #overlay {
      position: absolute;
      inset: 0;
      background: #000;
      opacity: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 1s ease;
      z-index: 5;
    }
    #storyText {
      max-width: 80vw;
      text-align: center;
      font-size: 1.8rem;
      line-height: 1.5;
      opacity: 0;
      transition: opacity 1s ease;
      color: #fff;
    }

    #skipBtn {
      position: absolute;
      top: 15px;
      right: 15px;
      z-index: 6;
      padding: 8px 14px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      border: 2px solid #fff;
      border-radius: 4px;
      font-size: 0.9rem;
      cursor: pointer;
      user-select: none;
    }

    /* GAMEPLAY */
    #gameLayer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      display: none;
      background: #3aa0ff; /* blue sky */
      z-index: 3;
    }

    #gameWorld {
      position: absolute;
      inset: 0;
      transition: transform 0s;
    }

    #player {
      position: absolute;
      width: 180px;
      left: 150px;
      top: 50%;
      transform: translateY(-50%) rotate(0deg);
      transition: transform 0.08s linear;
      z-index: 3;
    }

    .plane {
      position: absolute;
      width: 200px;
      z-index: 2;
    }

    #score {
      position: absolute;
      top: 15px;
      left: 20px;
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 4px rgba(0,0,0,0.6);
      z-index: 4;
    }

    /* DEATH SCREEN */
    #deathScreen {
      position: absolute;
      inset: 0;
      background: #3aa0ff; /* blue sky */
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    #deathText {
      text-align: center;
      color: #fff;
      margin-bottom: 20px;
      z-index: 2;
    }
    #deathText h1 {
      font-size: 2.4rem;
      margin-bottom: 10px;
    }
    #deathText p {
      font-size: 1.4rem;
      margin: 4px 0;
    }

    #deathImage {
      width: 350px;
      height: auto;
      margin-top: 20px;
      z-index: 2;
    }

    #deathGround {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 140px;
      background: #2ecc40; /* green ground only here */
      z-index: 1;
    }

    #restartBtn {
      margin-top: 20px;
      padding: 10px 18px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      border: 2px solid #fff;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      user-select: none;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div id="scene">

    <!-- INTRO -->
    <img id="gorillaIntro" src="images/gor1-removebg-preview.png" />
    <div id="vanillaText">VANILLA GORILLA</div>

    <div id="overlay">
      <div id="storyText"></div>
    </div>

    <button id="skipBtn">Skip cutscene</button>

    <!-- GAME -->
    <div id="gameLayer">
      <div id="gameWorld">
        <div id="score">Score: 0</div>
        <img id="player" src="images/gor2-removebg-preview.png" />
      </div>
    </div>

    <!-- DEATH SCREEN -->
    <div id="deathScreen">
      <div id="deathText">
        <h1 id="deathTitle">YOU DIED</h1>
        <p id="scoreLine">Score: 0</p>
        <p id="bestScoreLine">Best Score: 0</p>
        <button id="restartBtn">Go again</button>
      </div>
      <img id="deathImage" src="images/dead_gor-removebg-preview.png" />
      <div id="deathGround"></div>
    </div>

  </div>

  <script>
    const overlay = document.getElementById("overlay");
    const storyText = document.getElementById("storyText");
    const gameLayer = document.getElementById("gameLayer");
    const gameWorld = document.getElementById("gameWorld");
    const player = document.getElementById("player");
    const scoreEl = document.getElementById("score");
    const deathScreen = document.getElementById("deathScreen");
    const scoreLine = document.getElementById("scoreLine");
    const bestScoreLine = document.getElementById("bestScoreLine");
    const deathTitle = document.getElementById("deathTitle");
    const skipBtn = document.getElementById("skipBtn");
    const restartBtn = document.getElementById("restartBtn");
    const introGorilla = document.getElementById("gorillaIntro");
    const vanillaText = document.getElementById("vanillaText");

    const deathMessages = [
      "You died L bozo",
      "How r u so bad",
      "My grandma can play better than u"
    ];

    let cutsceneSkipped = false;

    /* INTRO TIMING */
    const blackScreenTime = 4500;
    const firstLineTime = blackScreenTime + 1000;
    const secondLineTime = firstLineTime + 4000;
    const startGameTime = secondLineTime + 4000;

    function showOverlay() {
      if (cutsceneSkipped) return;
      overlay.style.opacity = "1";
    }
    function showText(t) {
      if (cutsceneSkipped) return;
      storyText.style.opacity = "0";
      setTimeout(() => {
        if (cutsceneSkipped) return;
        storyText.textContent = t;
        storyText.style.opacity = "1";
      }, 400);
    }

    setTimeout(showOverlay, blackScreenTime);
    setTimeout(() => showText("The year is 2067 — 80 years since Hitler won the war."), firstLineTime);
    setTimeout(() => showText("You are the British last hope. Fly past the German army and crash into him to end it."), secondLineTime);

    setTimeout(() => {
      if (cutsceneSkipped) return;
      overlay.style.opacity = "0";
      setTimeout(() => {
        if (cutsceneSkipped) return;
        overlay.style.display = "none";
        startGameplay();
        skipBtn.style.display = "none";
      }, 1000);
    }, startGameTime);

    skipBtn.addEventListener("click", () => {
      if (cutsceneSkipped) return;
      cutsceneSkipped = true;
      overlay.style.display = "none";
      introGorilla.style.display = "none";
      vanillaText.style.display = "none";
      skipBtn.style.display = "none";
      startGameplay();
    });

    /* GAMEPLAY */
    let y = window.innerHeight / 2;
    let velocity = 0;
    let gravity = 0.45;
    const flapStrength = -10;
    let started = false;
    let running = false;
    let planes = [];
    let planeSpawnTimer = 0;
    let score = 0;
    let scoreTimer = 0;
    let safeFrames = 0;
    let bestScore = parseInt(localStorage.getItem("vg_best_score") || "0", 10);

    function startGameplay() {
      gameLayer.style.display = "block";
      gameLayer.style.background = "#3aa0ff";
      deathScreen.style.display = "none";

      running = true;
      started = false;
      y = window.innerHeight / 2;
      velocity = 0;
      planes = [];
      planeSpawnTimer = 0;
      score = 0;
      scoreTimer = 0;
      safeFrames = 0;

      player.src = "images/gor2-removebg-preview.png";
      player.style.top = y + "px";
      player.style.transform = "translateY(-50%) rotate(0deg)";
      gameWorld.style.transform = "translateY(0)";
      gameWorld.style.transition = "transform 0s";

      document.addEventListener("keydown", input);
      document.addEventListener("mousedown", input);

      requestAnimationFrame(gameLoop);
    }

    function input(e) {
      if (!running) return;
      if (e.type === "mousedown" || e.code === "Space" || e.code === "ArrowUp") flap();
    }

    function flap() {
      if (!started) started = true;
      velocity = flapStrength;
    }

    function spawnPlane() {
      const plane = document.createElement("img");
      plane.src = "images/plane-removebg-preview.png";
      plane.className = "plane";

      const minY = 60;
      const maxY = window.innerHeight - 220;
      plane.style.top = (Math.random() * (maxY - minY) + minY) + "px";
      plane.style.left = window.innerWidth + "px";
      plane.dataset.speed = (2.5 + Math.random() * 2.5).toString();

      gameWorld.appendChild(plane);
      planes.push(plane);
    }

    function rectsOverlap(a, b) {
      const ar = a.getBoundingClientRect();
      const br = b.getBoundingClientRect();
      return !(ar.right < br.left || ar.left > br.right || ar.bottom < br.top || ar.top > br.bottom);
    }

    function gameLoop() {
      if (!running) return;

      safeFrames++;

      if (started) {
        velocity += gravity;
        y += velocity;
      }

      const floor = window.innerHeight - 40;

      if (started && safeFrames > 40 && y > floor) {
        y = floor;
        triggerDeath();
        return;
      }

      if (y < 0) {
        y = 0;
        velocity = 0;
      }

      player.style.top = y + "px";

      let angle = velocity * 2;
      angle = Math.max(-35, Math.min(35, angle));
      player.style.transform = `translateY(-50%) rotate(${angle}deg)`;

      if (safeFrames > 120) {
        planeSpawnTimer++;
        if (planeSpawnTimer > 90) {
          planeSpawnTimer = 0;
          spawnPlane();
        }
      }

      planes.forEach((plane, i) => {
        const speed = parseFloat(plane.dataset.speed);
        const left = parseFloat(plane.style.left) - speed;
        plane.style.left = left + "px";

        if (left < -300) {
          plane.remove();
          planes.splice(i, 1);
        }
      });

      if (safeFrames > 80) {
        for (let p of planes) {
          if (rectsOverlap(player, p)) {
            triggerDeath();
            return;
          }
        }
      }

      scoreTimer++;
      if (scoreTimer >= 12) {
        scoreTimer = 0;
        score++;
        scoreEl.textContent = "Score: " + score;
      }

      requestAnimationFrame(gameLoop);
    }

    function triggerDeath() {
      if (!running) return;
      running = false;

      document.removeEventListener("keydown", input);
      document.removeEventListener("mousedown", input);

      player.src = "images/gor3-removebg-preview.png";

      let deathVel = 0;
      let deathGrav = 1.0;

      function fall() {
        deathVel += deathGrav;
        y += deathVel;
        player.style.top = y + "px";

        let angle = deathVel * 2;
        angle = Math.min(angle, 70);
        player.style.transform = `translateY(-50%) rotate(${angle}deg)`;

        if (y < window.innerHeight + 200) {
          requestAnimationFrame(fall);
        } else {
          scrollWorldDown();
        }
      }

      fall();
    }

    function scrollWorldDown() {
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem("vg_best_score", bestScore);
      }

      const msg = deathMessages[Math.floor(Math.random() * deathMessages.length)];
      deathTitle.textContent = msg;
      scoreLine.textContent = "Score: " + score;
      bestScoreLine.textContent = "Best Score: " + bestScore;

      deathScreen.style.display = "flex";
      deathScreen.style.zIndex = 1;
      gameLayer.style.background = "transparent";

      gameWorld.style.transition = "transform 2s ease-in";
      gameWorld.style.transform = "translateY(-100vh)";

      setTimeout(() => {
        gameLayer.style.display = "none";
      }, 2000);
    }

    restartBtn.addEventListener("click", () => {
      startGameplay();
    });
  </script>
</body>
</html>
