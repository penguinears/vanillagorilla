<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vanilla Gorilla Intro</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #111;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      color: #fff;
    }

    #scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    #gorilla {
      position: absolute;
      width: 300px; /* bigger */
      bottom: -250px;
      left: -250px;
      transform: rotate(25deg); /* now facing top-right */
      opacity: 0;
      animation: fly 4s ease-out forwards;
      animation-delay: 0.3s;
    }

    @keyframes fly {
      0% {
        bottom: -250px;
        left: -250px;
        opacity: 1;
        transform: rotate(25deg);
      }
      50% {
        opacity: 1;
      }
      100% {
        bottom: 100vh;
        left: 100vw;
        opacity: 0;
        transform: rotate(25deg);
      }
    }

    #vanillaText {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.1) rotate(-180deg);
      font-size: 3.5rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #f5f5f5;
      opacity: 0;
      text-align: center;
      animation: vanillaSpin 2.5s ease-out forwards;
      animation-delay: 2s;
    }

    @keyframes vanillaSpin {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.1) rotate(-180deg);
      }
      30% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.1) rotate(10deg);
      }
      60% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.9) rotate(20deg);
      }
    }

    #overlay {
      position: absolute;
      inset: 0;
      background: #000;
      opacity: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 1s ease;
    }

    #storyText {
      max-width: 80vw;
      text-align: center;
      font-size: 1.8rem;
      line-height: 1.5;
      opacity: 0;
      transition: opacity 1s ease;
    }
  </style>
</head>
<body>
  <div id="scene">
    <img id="gorilla" src="images/gor1-removebg-preview.png" alt="Gorilla" />
    <div id="vanillaText">VANILLA GORILLA</div>

    <div id="overlay">
      <div id="storyText"></div>
    </div>
  </div>

  <script>
    const overlay = document.getElementById("overlay");
    const storyText = document.getElementById("storyText");

    function showOverlay() {
      overlay.style.opacity = "1";
    }

    function showText(text) {
      storyText.style.opacity = "0";
      setTimeout(() => {
        storyText.textContent = text;
        storyText.style.opacity = "1";
      }, 400);
    }

    // Timings
    const blackScreenTime = 4500;
    const firstLineTime = blackScreenTime + 1000;
    const secondLineTime = firstLineTime + 4000;

    // Fade to black
    setTimeout(showOverlay, blackScreenTime);

    // First story line
    setTimeout(() => {
      showText("The year is 2067 — 80 years since Hitler won the war.");
    }, firstLineTime);

    // Second story line
    setTimeout(() => {
      showText("You are the British last hope. You must fly past the German army and crash into him, ending it once and for all.");
    }, secondLineTime);
  </script>
</body>
</html>
