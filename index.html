<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Vanilla Gorilla</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
*:focus{outline:none;}
body{
  background:#000;
  overflow:hidden;
  font-family:system-ui,sans-serif;
  -webkit-tap-highlight-color:transparent;
}
img{
  user-select:none;
  -webkit-user-drag:none;
  image-rendering:crisp-edges;
  pointer-events:none;
}

/* SCENE — BLUE SKY NOW */
#scene{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:#3aa0ff; /* BLUE SKY */
}

/* INTRO */
#gorillaIntro{
  position:absolute;
  width:260px;
  bottom:-220px;
  left:-220px;
  transform:rotate(25deg);
  opacity:0;
  animation:flyIntro 4s ease-out forwards;
  animation-delay:0.3s;
  filter:hue-rotate(200deg);
}
@keyframes flyIntro{
  0%{bottom:-220px;left:-220px;opacity:1;}
  50%{opacity:1;}
  100%{bottom:100vh;left:100vw;opacity:0;}
}
#vanillaText{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.1) rotate(-180deg);
  font-size:3.2rem;
  color:#fff;
  opacity:0;
  animation:vanillaSpin 2.5s ease-out forwards;
  animation-delay:2s;
}
@keyframes vanillaSpin{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.1) rotate(-180deg);}
  30%{opacity:1;transform:translate(-50%,-50%) scale(1.1) rotate(10deg);}
  60%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0deg);}
  100%{opacity:0;transform:translate(-50%,-50%) scale(0.9) rotate(20deg);}
}
#overlay{
  position:absolute;
  inset:0;
  background:#000; /* fades to black only during story */
  opacity:0;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:opacity 1s ease;
  z-index:5;
}
#storyText{
  color:#fff;
  font-size:1.6rem;
  max-width:80vw;
  text-align:center;
  opacity:0;
  transition:opacity 1s ease;
}
#skipBtn{
  position:absolute;
  bottom:15px;
  right:15px;
  padding:8px 14px;
  background:rgba(0,0,0,0.7);
  color:#fff;
  border:2px solid #fff;
  border-radius:4px;
  cursor:pointer;
  z-index:6;
}

/* GAME LAYER */
#gameLayer{
  position:absolute;
  inset:0;
  background:#3aa0ff;
  display:none;
  overflow:hidden;
  z-index:3;
}

/* STACK: GAME WORLD + DEATH SCREEN */
#worldStack{
  position:absolute;
  left:0;
  top:0;
  width:100%;
  height:200vh;
  transition:transform 0s;
}

/* GAME WORLD */
#gameWorld{
  position:absolute;
  left:0;
  top:0;
  width:100%;
  height:100vh;
}
#player{
  position:absolute;
  width:110px;
  left:150px;
  top:50%;
  transform:translateY(-50%) rotate(0deg);
  transition:transform 0.08s linear;
  z-index:4;
}
.plane{
  position:absolute;
  width:140px;
  z-index:3;
}
#score{
  position:absolute;
  top:15px;
  left:20px;
  font-size:1.6rem;
  font-weight:700;
  color:#fff;
  z-index:5;
}

/* DEATH SCREEN */
#deathScreen{
  position:absolute;
  left:0;
  top:100vh;
  width:100%;
  height:100vh;
  background:#3aa0ff;
  display:flex;
  align-items:flex-end;
  justify-content:center;
}
#deathGround{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:250px;
  background:#2ecc40;
  z-index:1;
}
#deathImage{
  width:520px;
  height:auto;
  position:absolute;
  bottom:210px; /* FIXED — sits ON grass */
  left:50%;
  transform:translateX(-50%);
  z-index:2;
}
#deathText{
  position:absolute;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  text-align:center;
  z-index:3;
}
#deathText h1{font-size:2.2rem;margin-bottom:10px;}
#deathText p{font-size:1.3rem;margin:4px 0;}
#restartBtn{
  margin-top:16px;
  padding:8px 16px;
  background:rgba(0,0,0,0.7);
  color:#fff;
  border:2px solid #fff;
  border-radius:4px;
  cursor:pointer;
}
</style>
</head>
<body>
<div id="scene">
  <img id="gorillaIntro" src="images/gor1-removebg-preview.png">
  <div id="vanillaText">VANILLA GORILLA</div>

  <div id="overlay"><div id="storyText"></div></div>
  <button id="skipBtn">Skip cutscene</button>

  <div id="gameLayer">
    <div id="worldStack">
      <div id="gameWorld">
        <div id="score">Score: 0</div>
        <img id="player" src="images/gor2-removebg-preview.png">
      </div>

      <div id="deathScreen">
        <div id="deathText">
          <h1 id="deathTitle">YOU DIED</h1>
          <p id="scoreLine">Score: 0</p>
          <p id="bestScoreLine">Best Score: 0</p>
          <button id="restartBtn">Go again</button>
        </div>
        <img id="deathImage" src="images/dead_gor-removebg-preview.png">
        <div id="deathGround"></div>
      </div>
    </div>
  </div>
</div>

<script>
/* INTRO */
const overlay=document.getElementById("overlay");
const storyText=document.getElementById("storyText");
const skipBtn=document.getElementById("skipBtn");
const introGorilla=document.getElementById("gorillaIntro");
const vanillaText=document.getElementById("vanillaText");

let cutsceneSkipped=false;

function fadeStory(t){
  storyText.style.opacity="0";
  setTimeout(()=>{
    if(cutsceneSkipped)return;
    storyText.textContent=t;
    storyText.style.opacity="1";
  },250);
}

setTimeout(()=>{if(!cutsceneSkipped)overlay.style.opacity="1";},4500);
setTimeout(()=>{if(!cutsceneSkipped)fadeStory("The year is 2067 — 80 years since Hitler won the war.");},5500);
setTimeout(()=>{if(!cutsceneSkipped)fadeStory("You are the British Rebellion’s last hope.");},9500);
setTimeout(()=>{
  if(cutsceneSkipped)return;
  overlay.style.opacity="0";
  setTimeout(()=>{
    if(cutsceneSkipped)return;
    overlay.style.display="none";
    startGameplay();
    skipBtn.style.display="none";
  },800);
},13500);

skipBtn.onclick=()=>{
  cutsceneSkipped=true;
  overlay.style.display="none";
  introGorilla.style.display="none";
  vanillaText.style.display="none";
  skipBtn.style.display="none";
  startGameplay();
};

/* GAMEPLAY */
const gameLayer=document.getElementById("gameLayer");
const worldStack=document.getElementById("worldStack");
const gameWorld=document.getElementById("gameWorld");
const player=document.getElementById("player");
const scoreEl=document.getElementById("score");
const deathTitle=document.getElementById("deathTitle");
const scoreLine=document.getElementById("scoreLine");
const bestScoreLine=document.getElementById("bestScoreLine");
const restartBtn=document.getElementById("restartBtn");

let y=window.innerHeight/2;
let velocity=0;
let gravity=0.18;
const flapStrength=-11.5;
let started=false;
let running=false;
let planes=[];
let planeSpawnTimer=0;
let score=0;
let scoreTimer=0;
let safeFrames=0;
let bestScore=parseInt(localStorage.getItem("vg_best_score")||"0",10);

function startGameplay(){
  gameLayer.style.display="block";
  worldStack.style.transform="translateY(0)";
  worldStack.style.transition="transform 0s";

  running=true;
  started=false;
  y=window.innerHeight/2;
  velocity=0;

  /* FIX: remove leftover planes */
  planes.forEach(p=>p.remove());
  planes=[];
  planeSpawnTimer=0;

  score=0;
  scoreTimer=0;
  safeFrames=0;
  gravity=0.18;

  player.src="images/gor2-removebg-preview.png";
  player.style.top=y+"px";
  player.style.transform="translateY(-50%) rotate(0deg)";
  player.style.display="block"; /* FIX: show player again */
  scoreEl.textContent="Score: 0";

  document.addEventListener("keydown",input);
  document.addEventListener("mousedown",input);

  requestAnimationFrame(gameLoop);
}

function input(e){
  if(!running)return;
  if(e.type==="mousedown"||e.code==="Space"||e.code==="ArrowUp")flap();
}

function flap(){
  if(!started)started=true;
  velocity=flapStrength;
}

function spawnPlane(){
  if(planes.length>=3)return;

  const plane=document.createElement("img");
  plane.src="images/plane-removebg-preview.png";
  plane.className="plane";

  const minY=70;
  const maxY=window.innerHeight-230;
  plane.style.top=(Math.random()*(maxY-minY)+minY)+"px";
  plane.style.left=window.innerWidth+"px";

  let speedBase=0.9;
  let speedScale=Math.min(1.2,safeFrames/600);
  plane.dataset.speed=(speedBase+Math.random()*0.6+speedScale).toString();

  gameWorld.appendChild(plane);
  planes.push(plane);
}

function hit(a,b){
  const ar=a.getBoundingClientRect();
  const br=b.getBoundingClientRect();
  const shrink=28;
  return !(
    ar.right-shrink<br.left+shrink ||
    ar.left+shrink>br.right-shrink ||
    ar.bottom-shrink<br.top+shrink ||
    ar.top+shrink>br.bottom-shrink
  );
}

function gameLoop(){
  if(!running)return;

  safeFrames++;

  if(safeFrames>800)gravity=0.26;

  if(started){
    velocity+=gravity;
    y+=velocity;
  }

  const floor=window.innerHeight-45;
  if(started && safeFrames>70 && y>floor){
    y=floor;
    triggerDeath();
    return;
  }

  if(y<0){y=0;velocity=0;}

  player.style.top=y+"px";

  let angle=velocity*1.6;
  if(angle>25)angle=25;
  if(angle<-25)angle=-25;
  player.style.transform=`translateY(-50%) rotate(${angle}deg)`;

  if(safeFrames>180){
    planeSpawnTimer++;
    let spawnRate=Math.max(120,220-safeFrames/6);
    if(planeSpawnTimer>spawnRate){
      planeSpawnTimer=0;
      spawnPlane();
    }
  }

  planes.forEach((plane,i)=>{
    const speed=parseFloat(plane.dataset.speed);
    const left=parseFloat(plane.style.left)-speed;
    plane.style.left=left+"px";
    if(left<-250){
      plane.remove();
      planes.splice(i,1);
    }
  });

  if(safeFrames>140){
    for(const p of planes){
      if(hit(player,p)){
        triggerDeath();
        return;
      }
    }
  }

  scoreTimer++;
  if(scoreTimer>=14){
    scoreTimer=0;
    score++;
    scoreEl.textContent="Score: "+score;
  }

  requestAnimationFrame(gameLoop);
}

/* DEATH */
function triggerDeath(){
  if(!running)return;
  running=false;

  document.removeEventListener("keydown",input);
  document.removeEventListener("mousedown",input);

  player.src="images/gor3-removebg-preview.png";

  let dv=0;
  const dg=0.9;

  function fall(){
    dv+=dg;
    y+=dv;
    player.style.top=y+"px";
    player.style.transform=`translateY(-50%) rotate(15deg)`;

    if(y<window.innerHeight+160){
      requestAnimationFrame(fall);
    }else{
      startScrollDown();
    }
  }
  fall();
}

function startScrollDown(){
  if(score>bestScore){
    bestScore=score;
    localStorage.setItem("vg_best_score",String(bestScore));
  }

  const msgs=[
    "You died L bozo",
    "How r u so bad",
    "My grandma can play better then u"
  ];
  deathTitle.textContent=msgs[Math.floor(Math.random()*msgs.length)];
  scoreLine.textContent="Score: "+score;
  bestScoreLine.textContent="Best Score: "+bestScore;

  player.style.display="none"; /* FIX: hide tiny gorilla */

  worldStack.style.transition="transform 2s ease-in";
  worldStack.style.transform="translateY(-100vh)";
}

restartBtn.onclick=()=>{startGameplay();};
</script>
</body>
</html>
