<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vanilla Gorilla</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:sans-serif;}

#scene{width:100vw;height:100vh;background:#3aa0ff;position:relative;overflow:hidden;}

/* INTRO ALWAYS */
#gorillaIntro{
  position:absolute;
  width:260px;
  bottom:-220px;
  left:-220px;
  transform:rotate(25deg);
  opacity:0;
  animation:flyIntro 4s ease-out forwards;
  animation-delay:0.3s;
}
@keyframes flyIntro{
  0%{bottom:-220px;left:-220px;opacity:1;}
  100%{bottom:100vh;left:100vw;opacity:0;}
}

#vanillaText{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.1) rotate(-180deg);
  font-size:3rem;
  color:#fff;
  opacity:0;
  animation:vanillaSpin 2.5s ease-out forwards;
  animation-delay:2s;
}
@keyframes vanillaSpin{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.1) rotate(-180deg);}
  40%{opacity:1;transform:translate(-50%,-50%) scale(1.1) rotate(10deg);}
  100%{opacity:0;}
}

/* STORY (only once) */
#overlay{
  position:absolute;inset:0;background:#000;color:#fff;
  display:flex;align-items:center;justify-content:center;
  text-align:center;opacity:0;transition:opacity 1s;z-index:5;
}

#skipBtn{
  position:absolute;bottom:15px;right:15px;
  padding:8px 14px;background:#000;color:#fff;border:2px solid #fff;
  z-index:6;
}

/* GAME */
#gameLayer{position:absolute;inset:0;display:none;}
#worldStack{position:absolute;width:100%;height:200vh;}
#gameWorld{position:absolute;width:100%;height:100vh;}

#player{
  position:absolute;width:22vw;max-width:110px;
  left:140px;top:50%;transform:translateY(-50%);
}

.plane{position:absolute;width:28vw;max-width:140px;}

#score{position:absolute;top:15px;left:20px;color:#fff;font-size:1.5rem;}
#hearts{position:absolute;top:15px;right:20px;font-size:1.6rem;}

#pauseBtn{
  position:absolute;bottom:15px;left:15px;
  padding:8px 12px;background:#000;color:#fff;border:2px solid #fff;
}

/* DEATH */
#deathScreen{position:absolute;top:100vh;width:100%;height:100vh;}
#deathImage{position:absolute;bottom:0;width:100%;}
#deathText{
  position:absolute;top:60px;left:50%;
  transform:translateX(-50%);color:#fff;text-align:center;
}
button{cursor:pointer;}
</style>
</head>

<body>
<div id="scene">

<!-- ALWAYS INTRO -->
<img id="gorillaIntro" src="images/gor1-removebg-preview.png">
<div id="vanillaText">VANILLA GORILLA</div>

<!-- STORY -->
<div id="overlay"><div id="storyText"></div></div>
<button id="skipBtn">Skip</button>

<!-- GAME -->
<div id="gameLayer">
<div id="worldStack">

<div id="gameWorld">
<div id="score">Score: 0</div>
<div id="hearts">❤️❤️❤️</div>
<button id="pauseBtn">Pause</button>
<img id="player" src="images/gor2-removebg-preview.png">
</div>

<div id="deathScreen">
<div id="deathText">
<h1>YOU DIED</h1>
<p id="scoreLine"></p>
<p id="bestScoreLine"></p>
<button id="restartBtn">Restart</button>
</div>
<img id="deathImage" src="images/dead gor.png">
</div>

</div>
</div>

</div>

<script>
const overlay=document.getElementById("overlay");
const storyText=document.getElementById("storyText");
const skipBtn=document.getElementById("skipBtn");

const gameLayer=document.getElementById("gameLayer");
const worldStack=document.getElementById("worldStack");
const player=document.getElementById("player");

const scoreEl=document.getElementById("score");
const heartsEl=document.getElementById("hearts");
const pauseBtn=document.getElementById("pauseBtn");

const scoreLine=document.getElementById("scoreLine");
const bestScoreLine=document.getElementById("bestScoreLine");
const restartBtn=document.getElementById("restartBtn");

let y, velocity;
const flapStrength=-10.5;

let running=false, paused=false;
let planes=[];
let score=0, scoreTimer=0;
let lives=3;
let bestScore=parseInt(localStorage.getItem("vg_best_score")||"0");

let seenIntro=localStorage.getItem("vg_seen_intro");

/* STORY CUTSCENE */
function playStory(){
  overlay.style.opacity="1";

  setTimeout(()=>{storyText.textContent=" Its 1969 23 years after we lost the war to the Nazis...";},1000);
  setTimeout(()=>{storyText.textContent="You are the Brittish Rebeliions last hope.";},4000);

  setTimeout(()=>{
    overlay.style.opacity="0";
    setTimeout(()=>{
      overlay.style.display="none";
      startGame();
    },1000);
  },7000);
}

/* ALWAYS INTRO FIRST */
setTimeout(()=>{
  if(seenIntro){
    overlay.style.display="none";
    startGame();
  }else{
    playStory();
    localStorage.setItem("vg_seen_intro","1");
  }
},4500);

skipBtn.onclick=()=>{
  overlay.style.display="none";
  skipBtn.style.display="none";
  startGame();
};

/* GAME */
function updateHearts(){
  heartsEl.textContent="❤️".repeat(lives);
}

document.addEventListener("mousedown", flap);
document.addEventListener("touchstart", e=>{e.preventDefault();flap();});

pauseBtn.onclick=()=>{
  paused=!paused;
  pauseBtn.textContent=paused?"Resume":"Pause";
};

function flap(){
  if(!running||paused)return;
  velocity=flapStrength;
}

function spawnPlane(gap=false){
  if(gap){
    let gapY=Math.random()*(window.innerHeight-200)+100;
    createPlane(gapY-180);
    createPlane(gapY+180);
    return;
  }
  createPlane(Math.random()*(window.innerHeight-200)+80);
}

function createPlane(yPos){
  const p=document.createElement("img");
  p.src="images/plane-removebg-preview.png";
  p.className="plane";
  p.style.top=yPos+"px";
  p.style.left=window.innerWidth+"px";
  p.dataset.speed=1.5+Math.random();
  document.getElementById("gameWorld").appendChild(p);
  planes.push(p);
}

function hit(a,b){
  const ar=a.getBoundingClientRect();
  const br=b.getBoundingClientRect();
  return !(ar.right<br.left||ar.left>br.right||ar.bottom<br.top||ar.top>br.bottom);
}

function shake(){
  document.body.style.transform="translate(6px)";
  setTimeout(()=>document.body.style.transform="translate(-6px)",50);
  setTimeout(()=>document.body.style.transform="translate(0)",100);
}

function loop(){
  if(!running)return;

  if(!paused){
    velocity+=0.2;
    y+=velocity;

    if(y<0){y=0;velocity=0;}
    if(y>window.innerHeight-40){triggerDeath();return;}

    player.style.top=y+"px";
    player.style.transform=`translateY(-50%) rotate(${velocity*2}deg)`;

    if(Math.random()<0.02){
      spawnPlane(Math.random()<0.3);
    }

    planes.forEach((p,i)=>{
      let left=parseFloat(p.style.left)-parseFloat(p.dataset.speed);
      p.style.left=left+"px";
      if(left<-200){p.remove();planes.splice(i,1);}
    });

    for(const p of planes){
      if(hit(player,p)){
        lives--;
        updateHearts();
        shake();

        if(lives<=0){
          triggerDeath();
          return;
        }
      }
    }

    scoreTimer++;
    if(scoreTimer>14){
      score++;
      scoreTimer=0;
      scoreEl.textContent="Score: "+score;
    }
  }

  requestAnimationFrame(loop);
}

function triggerDeath(){
  running=false;

  let dv=0;
  function fall(){
    dv+=0.9;
    y+=dv;
    player.style.top=y+"px";

    if(y<window.innerHeight+200){
      requestAnimationFrame(fall);
    }else{
      showDeath();
    }
  }
  fall();
}

function showDeath(){
  if(score>bestScore){
    bestScore=score;
    localStorage.setItem("vg_best_score",bestScore);
  }

  scoreLine.textContent="Score: "+score;
  bestScoreLine.textContent="Best: "+bestScore;

  worldStack.style.transform="translateY(-100vh)";
}

restartBtn.onclick=()=>location.reload();

function startGame(){
  gameLayer.style.display="block";

  y=window.innerHeight/2;
  velocity=0;
  lives=3;
  score=0;
  running=true;

  updateHearts();
  loop();
}
</script>

</body>
</html>
