<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Vanilla Gorilla</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
*:focus{outline:none;}

body{
  background:#000;
  overflow:hidden;
  font-family:system-ui,sans-serif;
  -webkit-tap-highlight-color:transparent;
}

img{
  user-select:none;
  -webkit-user-drag:none;
  image-rendering:crisp-edges;
  pointer-events:none;
}

#scene{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:#3aa0ff;
}

/* Intro */
#gorillaIntro{
  position:absolute;
  width:260px;
  bottom:-220px;
  left:-220px;
  transform:rotate(25deg);
  opacity:0;
  animation:flyIntro 4s ease-out forwards;
  animation-delay:0.3s;
  filter:hue-rotate(200deg);
}

@keyframes flyIntro{
  0%{bottom:-220px;left:-220px;opacity:1;}
  100%{bottom:100vh;left:100vw;opacity:0;}
}

#vanillaText{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.1) rotate(-180deg);
  font-size:3.2rem;
  color:#fff;
  opacity:0;
  animation:vanillaSpin 2.5s ease-out forwards;
  animation-delay:2s;
}

@keyframes vanillaSpin{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.1) rotate(-180deg);}
  30%{opacity:1;transform:translate(-50%,-50%) scale(1.1) rotate(10deg);}
  60%{opacity:1;}
  100%{opacity:0;}
}

#overlay{
  position:absolute;
  inset:0;
  background:#000;
  opacity:0;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:opacity 1s ease;
  z-index:5;
}

#storyText{
  color:#fff;
  font-size:1.6rem;
  max-width:80vw;
  text-align:center;
  opacity:0;
  transition:opacity 1s ease;
}

#skipBtn{
  position:absolute;
  bottom:15px;
  right:15px;
  padding:8px 14px;
  background:rgba(0,0,0,0.7);
  color:#fff;
  border:2px solid #fff;
  border-radius:4px;
  cursor:pointer;
  z-index:6;
}

/* Game */
#gameLayer{
  position:absolute;
  inset:0;
  display:none;
  overflow:hidden;
}

#worldStack{
  position:absolute;
  width:100%;
  height:200vh;
}

#gameWorld{
  position:absolute;
  width:100%;
  height:100vh;
}

#player{
  position:absolute;
  width:22vw;
  max-width:110px;
  left:150px;
  top:50%;
  transform:translateY(-50%);
}

.plane{
  position:absolute;
  width:28vw;
  max-width:140px;
}

#score{
  position:absolute;
  top:15px;
  left:20px;
  font-size:1.6rem;
  font-weight:700;
  color:#fff;
}

/* Death */
#deathScreen{
  position:absolute;
  top:100vh;
  width:100%;
  height:100vh;
}

#deathImage{
  position:absolute;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  height:auto;
  object-fit:cover;
  z-index:1;
}

#deathText{
  position:absolute;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  text-align:center;
  z-index:3;
}

#restartBtn{
  margin-top:16px;
  padding:8px 16px;
  background:rgba(0,0,0,0.7);
  color:#fff;
  border:2px solid #fff;
  border-radius:4px;
  cursor:pointer;
}
</style>
</head>

<body>
<div id="scene">

<img id="gorillaIntro" src="images/gor1-removebg-preview.png">
<div id="vanillaText">VANILLA GORILLA</div>

<div id="overlay"><div id="storyText"></div></div>
<button id="skipBtn">Skip cutscene</button>

<div id="gameLayer">
<div id="worldStack">

<div id="gameWorld">
<div id="score">Score: 0</div>
<img id="player" src="images/gor2-removebg-preview.png">
</div>

<div id="deathScreen">
<div id="deathText">
<h1 id="deathTitle">YOU DIED</h1>
<p id="scoreLine">Score: 0</p>
<p id="bestScoreLine">Best Score: 0</p>
<button id="restartBtn">Go again</button>
</div>
<img id="deathImage" src="images/dead gor.png">
</div>

</div>
</div>
</div>

<script>
const overlay=document.getElementById("overlay");
const storyText=document.getElementById("storyText");
const skipBtn=document.getElementById("skipBtn");
const introGorilla=document.getElementById("gorillaIntro");
const vanillaText=document.getElementById("vanillaText");

let cutsceneSkipped=false;

function fadeStory(t){
  storyText.style.opacity="0";
  setTimeout(()=>{
    if(cutsceneSkipped)return;
    storyText.textContent=t;
    storyText.style.opacity="1";
  },250);
}

setTimeout(()=>{if(!cutsceneSkipped)overlay.style.opacity="1";},4500);
setTimeout(()=>{if(!cutsceneSkipped)fadeStory("The year is 2067 — 80 years since Hitler won the war.");},5500);
setTimeout(()=>{if(!cutsceneSkipped)fadeStory("You are the British Rebellion’s last hope.");},9500);

setTimeout(()=>{
  if(cutsceneSkipped)return;
  overlay.style.opacity="0";
  setTimeout(()=>{
    overlay.style.display="none";
    startGameplay();
    skipBtn.style.display="none";
  },800);
},13500);

skipBtn.onclick=()=>{
  cutsceneSkipped=true;
  overlay.style.display="none";
  introGorilla.style.display="none";
  vanillaText.style.display="none";
  skipBtn.style.display="none";
  startGameplay();
};

const gameLayer=document.getElementById("gameLayer");
const worldStack=document.getElementById("worldStack");
const gameWorld=document.getElementById("gameWorld");
const player=document.getElementById("player");
const scoreEl=document.getElementById("score");

const deathTitle=document.getElementById("deathTitle");
const scoreLine=document.getElementById("scoreLine");
const bestScoreLine=document.getElementById("bestScoreLine");
const restartBtn=document.getElementById("restartBtn");

let y=window.innerHeight/2;
let velocity=0;
let gravity=0.18;
const flapStrength=-10.5;

let started=false;
let running=false;
let planes=[];
let planeSpawnTimer=0;

let score=0;
let scoreTimer=0;
let safeFrames=0;

let bestScore=parseInt(localStorage.getItem("vg_best_score")||"0",10);

function startGameplay(){
  gameLayer.style.display="block";
  worldStack.style.transform="translateY(0)";
  worldStack.style.transition="transform 0s";

  running=true;
  started=false;
  y=window.innerHeight/2;
  velocity=0;

  planes.forEach(p=>p.remove());
  planes=[];
  planeSpawnTimer=0;

  score=0;
  scoreTimer=0;
  safeFrames=0;
  gravity=0.18;

  player.style.top=y+"px";
  player.style.display="block";

  scoreEl.textContent="Score: 0";

  document.addEventListener("keydown",input);
  document.addEventListener("mousedown",input);
  document.addEventListener("touchstart",input,{passive:false});

  requestAnimationFrame(gameLoop);
}

function input(e){
  if(!running)return;

  if(e.type==="touchstart"){
    e.preventDefault();
    flap();
    return;
  }

  if(e.type==="mousedown"||e.code==="Space"||e.code==="ArrowUp"){
    flap();
  }
}

function flap(){
  if(!started)started=true;
  velocity=flapStrength;
}

function spawnPlane(){
  let maxPlanes=Math.min(6,2+Math.floor(safeFrames/500));
  if(planes.length>=maxPlanes)return;

  const plane=document.createElement("img");
  plane.src="images/plane-removebg-preview.png";
  plane.className="plane";

  let yPos=Math.random()*(window.innerHeight-200)+80;
  plane.style.top=yPos+"px";
  plane.style.left=window.innerWidth+"px";

  let speedBase=1.2;
  let speedScale=Math.min(1.5,safeFrames/1200);

  plane.dataset.speed=(speedBase+Math.random()*0.5+speedScale);

  gameWorld.appendChild(plane);
  planes.push(plane);
}

function hit(a,b){
  const ar=a.getBoundingClientRect();
  const br=b.getBoundingClientRect();
  return !(ar.right<br.left||ar.left>br.right||ar.bottom<br.top||ar.top>br.bottom);
}

function gameLoop(){
  if(!running)return;

  safeFrames++;

  if(safeFrames>600)gravity=0.22;
  if(safeFrames>1400)gravity=0.26;

  if(started){
    velocity+=gravity;
    y+=velocity;
  }

  if(y>window.innerHeight-40){
    triggerDeath();
    return;
  }

  player.style.top=y+"px";

  if(safeFrames>180){
    planeSpawnTimer++;
    let spawnRate=Math.max(110,220-safeFrames*0.12);

    if(planeSpawnTimer>spawnRate){
      planeSpawnTimer=0;
      spawnPlane();
    }
  }

  planes.forEach((p,i)=>{
    let left=parseFloat(p.style.left)-parseFloat(p.dataset.speed);
    p.style.left=left+"px";

    if(left<-200){
      p.remove();
      planes.splice(i,1);
    }
  });

  if(safeFrames>120){
    for(const p of planes){
      if(hit(player,p)){
        triggerDeath();
        return;
      }
    }
  }

  scoreTimer++;
  if(scoreTimer>=14){
    scoreTimer=0;
    score++;
    scoreEl.textContent="Score: "+score;
  }

  requestAnimationFrame(gameLoop);
}

function triggerDeath(){
  running=false;

  let dv=0;

  function fall(){
    dv+=0.9;
    y+=dv;
    player.style.top=y+"px";

    if(y<window.innerHeight+200){
      requestAnimationFrame(fall);
    }else{
      startScrollDown();
    }
  }
  fall();
}

function startScrollDown(){
  if(score>bestScore){
    bestScore=score;
    localStorage.setItem("vg_best_score",bestScore);
  }

  scoreLine.textContent="Score: "+score;
  bestScoreLine.textContent="Best Score: "+bestScore;

  player.style.display="none";

  worldStack.style.transition="transform 2s ease";
  worldStack.style.transform="translateY(-100vh)";
}

restartBtn.onclick=()=>startGameplay();
</script>
</body>
</html>
