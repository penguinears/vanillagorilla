<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanilla Gorilla</title>

<link rel="icon" type="image/png" href="images/goggg-removebg-preview.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
user-select:none;
-webkit-user-select:none;
-webkit-tap-highlight-color:transparent;
}

body{
background:#000;
overflow:hidden;
font-family:sans-serif;
}

img{
user-select:none;
-webkit-user-drag:none;
pointer-events:none;
}

#scene{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
background:#3aa0ff;
}

/* INTRO */
#gorillaIntro{
position:absolute;
width:240px;
bottom:-220px;
left:-220px;
transform:rotate(25deg);
opacity:0;
animation:flyIntro 4s ease-out forwards;
animation-delay:0.3s;
z-index:6;
}

@keyframes flyIntro{
0%{bottom:-220px;left:-220px;opacity:1;}
100%{bottom:100vh;left:100vw;opacity:0;}
}

#vanillaText{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.1) rotate(-180deg);
font-size:3.2rem;
color:#fff;
opacity:0;
animation:vanillaSpin 2.5s ease-out forwards;
animation-delay:2s;
z-index:6;
}

@keyframes vanillaSpin{
0%{opacity:0;transform:translate(-50%,-50%) scale(0.1) rotate(-180deg);}
30%{opacity:1;transform:translate(-50%,-50%) scale(1.1) rotate(10deg);}
60%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0deg);}
100%{opacity:0;transform:translate(-50%,-50%) scale(0.9) rotate(20deg);}
}

/* OVERLAY */
#overlay{
position:absolute;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:#fff;
font-size:1.6rem;
opacity:0;
pointer-events:none;
z-index:7;
transition:opacity 0.6s;
}

/* GAME */
#gameLayer{
position:absolute;
inset:0;
}

#worldStack{
position:absolute;
width:100%;
height:200vh;
}

#gameWorld{
position:absolute;
width:100%;
height:100vh;
}

/* PLAYER */
#player{
position:absolute;
width:100px;
left:150px;
top:50%;
transform:translateY(-50%);
z-index:4;
display:none;
}

/* OBJECTS */
.plane{
position:absolute;
width:120px;
z-index:3;
}

.banana{
position:absolute;
width:55px;
z-index:3;
}

/* HUD */
#score{
position:absolute;
top:10px;
left:20px;
color:#fff;
font-size:1.6rem;
z-index:5;
}

#bananaCount{
position:absolute;
top:42px;
left:20px;
color:#ffe066;
z-index:5;
display:flex;
align-items:center;
gap:6px;
}

#bananaCount img{
width:26px;
}

#hearts{
position:absolute;
top:15px;
right:20px;
z-index:5;
font-size:1.6rem;
}

/* PAUSE */
#pauseBtn{
position:absolute;
top:12px;
left:50%;
transform:translateX(-50%);
color:#fff;
z-index:6;
display:none;
}

/* DEATH */
#deathScreen{
position:absolute;
top:100vh;
width:100%;
height:100vh;
display:flex;
align-items:flex-end;
justify-content:center;
}

#deathText{
position:absolute;
top:60px;
left:50%;
transform:translateX(-50%);
color:#fff;
text-align:center;
}

#restartBtn{
margin-top:16px;
padding:8px 16px;
background:#000;
color:#fff;
border:2px solid #fff;
cursor:pointer;
}

/* SHOP */
#shopButton{
position:absolute;
bottom:18px;
right:18px;
width:70px;
height:70px;
cursor:pointer;
}

#shopOverlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
z-index:9;
}

#shopPanel{
background:#111;
border:2px solid #444;
padding:16px;
color:#fff;
text-align:center;
position:relative;
}

.shop-arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

#shopPrev{left:10px;}
#shopNext{right:10px;}
</style>
</head>

<body>

<div id="scene">

<img id="gorillaIntro" src="images/gor1-removebg-preview.png">
<div id="vanillaText">VANILLA GORILLA</div>

<div id="overlay">
<div id="overlayText">Survive the skies.</div>
</div>

<div id="gameLayer">
<div id="worldStack">

<div id="gameWorld">

<div id="score">Score: 0</div>

<div id="bananaCount">
<img src="images/bbb-removebg-preview.png">
<span id="bananaText">Bananas: 0</span>
</div>

<div id="hearts">❤️❤️❤️</div>

<div id="pauseBtn">
<i class="fa-solid fa-pause"></i>
</div>

<img id="player" src="images/gor2-removebg-preview.png">

</div>

<div id="deathScreen">
<div id="deathText">
<h1>YOU DIED</h1>
<p id="scoreLine">Score: 0</p>
<p id="bestScoreLine">Best Score: 0</p>
<p id="bananaLine">Bananas: 0</p>
<button id="restartBtn">Go again</button>
</div>

<img id="shopButton" src="images/shop-removebg-preview.png">
</div>

</div>
</div>

<div id="shopOverlay">
<div id="shopPanel">

<div id="shopClose">X</div>

<div id="shopPrev" class="shop-arrow">&lt;</div>
<div id="shopNext" class="shop-arrow">&gt;</div>

<img id="shopSkinImage" src="">
<div id="shopInfo"></div>
<div id="shopLock"></div>
<button id="shopActionBtn"></button>

</div>
</div>

</div>
<script>

/* =========================
   ELEMENTS
========================= */
const overlay=document.getElementById("overlay");
const overlayText=document.getElementById("overlayText");
const player=document.getElementById("player");
const scoreEl=document.getElementById("score");
const heartsEl=document.getElementById("hearts");
const bananaText=document.getElementById("bananaText");
const restartBtn=document.getElementById("restartBtn");
const pauseBtn=document.getElementById("pauseBtn");

/* =========================
   DEVICE DETECTION
========================= */
const isPC=!/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

/* =========================
   PHYSICS (PC BUFFED)
========================= */
let baseFlapStrengthPC=-8.6;
let baseGravityPC=0.18;

let baseFlapStrengthMobile=-6.6;
let baseGravityMobile=0.25;

let flapStrength=isPC?baseFlapStrengthPC:baseFlapStrengthMobile;
let gravity=isPC?baseGravityPC:baseGravityMobile;

/* =========================
   GAME STATE
========================= */
let y=window.innerHeight/2;
let velocity=0;

let running=false;
let started=false;
let paused=false;
let allowInput=false;

let planes=[];
let bananas=[];

let score=0;
let scoreTimer=0;
let safeFrames=0;

let lives=3;

/* =========================
   WALLS EVENT
========================= */
let inWalls=false;

function startWalls(){
  if(inWalls) return;

  inWalls=true;
  flashText("WALLS");

  for(let i=0;i<5;i++){
    setTimeout(()=>spawnWall(), i*600);
  }

  setTimeout(()=>{
    inWalls=false;
  },4000);
}

function spawnWall(){
  const gapSize=180;
  const gapY=Math.random()*(window.innerHeight-gapSize-100)+50;

  for(let yPos=0;yPos<window.innerHeight;yPos+=90){

    if(yPos>gapY && yPos<gapY+gapSize) continue;

    const plane=document.createElement("img");
    plane.src="images/plane-removebg-preview.png";
    plane.className="plane";

    plane.style.left=window.innerWidth+"px";
    plane.style.top=yPos+"px";
    plane.style.width = isPC ? "120px":"90px";

    let speed = isPC ? 6 : 4;
    plane.dataset.speed=speed;

    document.getElementById("gameWorld").appendChild(plane);
    planes.push(plane);
  }
}

/* =========================
   SPAWN NORMAL PLANES (PC HARDER)
========================= */
function spawnPlane(){

  let maxPlanes;

  if(isPC){
    maxPlanes=Math.min(12,4+Math.floor(safeFrames/250));
  }else{
    maxPlanes=Math.min(7,2+Math.floor(safeFrames/350));
  }

  if(planes.length>=maxPlanes)return;

  const plane=document.createElement("img");
  plane.src="images/plane-removebg-preview.png";
  plane.className="plane";

  plane.style.top=Math.random()*(window.innerHeight-220)+"px";
  plane.style.left=window.innerWidth+"px";

  let speed=2.5+Math.random()*2;

  if(!isPC){
    speed*=0.7;
  }else{
    speed*=1.45;
  }

  plane.dataset.speed=speed;

  document.getElementById("gameWorld").appendChild(plane);
  planes.push(plane);
}

/* =========================
   COLLISION
========================= */
function hit(a,b){
  const ar=a.getBoundingClientRect();
  const br=b.getBoundingClientRect();

  return !(ar.right<br.left || ar.left>br.right || ar.bottom<br.top || ar.top>br.bottom);
}

/* =========================
   INPUT
========================= */
document.addEventListener("keydown",e=>{
  if(e.code==="Space"){
    flap();
  }
});

document.addEventListener("mousedown",flap);

function flap(){
  if(!allowInput) return;

  if(!running){
    startGame();
    return;
  }

  velocity=flapStrength;
}

/* =========================
   TEXT EFFECT
========================= */
function flashText(txt){
  const t=document.createElement("div");
  t.textContent=txt;

  t.style.position="absolute";
  t.style.top="50%";
  t.style.left="50%";
  t.style.transform="translate(-50%,-50%)";
  t.style.fontSize="40px";
  t.style.color="cyan";
  t.style.zIndex="10";

  document.body.appendChild(t);

  setTimeout(()=>t.remove(),1500);
}

/* =========================
   GAME LOOP
========================= */
function gameLoop(){

  if(!running || paused) return;

  safeFrames++;

  velocity+=gravity;
  y+=velocity;

  player.style.top=y+"px";

  if(y<0) y=0;
  if(y>window.innerHeight-80){
    triggerDeath();
    return;
  }

  /* SPAWNING */
  if(started && safeFrames>100 && !inWalls){
    if(Math.random()<0.03){
      spawnPlane();
    }
  }

  /* MOVE PLANES */
  for(let i=planes.length-1;i>=0;i--){
    let p=planes[i];

    let left=parseFloat(p.style.left)-parseFloat(p.dataset.speed);
    p.style.left=left+"px";

    if(left<-200){
      p.remove();
      planes.splice(i,1);
      continue;
    }

    if(hit(player,p)){
      lives--;
      p.remove();
      planes.splice(i,1);

      if(lives<=0){
        triggerDeath();
        return;
      }
    }
  }

  /* SCORE */
  scoreTimer++;
  if(scoreTimer>12){
    score++;
    scoreTimer=0;
    scoreEl.textContent="Score: "+score;
  }

  /* WALLS TRIGGER */
  if(!inWalls && score>150 && score%180===0){
    if(Math.random()<0.6){
      startWalls();
    }
  }

  requestAnimationFrame(gameLoop);
}

/* =========================
   START GAME
========================= */
function startGame(){
  running=true;
  started=true;
  lives=3;
  score=0;
  safeFrames=0;

  player.style.display="block";
  pauseBtn.style.display="block";

  requestAnimationFrame(gameLoop);
}

/* =========================
   DEATH
========================= */
function triggerDeath(){
  running=false;
  alert("you died");
  location.reload();
}
/* =========================
   SHOP SYSTEM
========================= */
const SKINS=[
  {id:"vanilla",name:"Vanilla Gorilla",price:0,unlocked:true,icon:"images/goggg-removebg-preview.png",fly:"images/gor2-removebg-preview.png",fall:"images/gor3-removebg-preview.png",dead:"images/dead gor.png"},
  {id:"spider",name:"Spider Gorilla",price:100,unlocked:false,icon:"images/spider-removebg-preview.png",fly:"images/flyspider-removebg-preview.png",fall:"images/flyspider-removebg-preview.png",dead:"images/spider-removebg-preview.png"}
];

let ownedSkins=JSON.parse(localStorage.getItem("vg_owned_skins")||'["vanilla"]');
SKINS.forEach(s=>{ if(ownedSkins.includes(s.id)) s.unlocked=true; });
let currentSkinId=localStorage.getItem("vg_current_skin")||"vanilla";
if(!ownedSkins.includes(currentSkinId)) currentSkinId="vanilla";

const shopOverlay=document.getElementById("shopOverlay");
const shopSkinImage=document.getElementById("shopSkinImage");
const shopInfo=document.getElementById("shopInfo");
const shopLock=document.getElementById("shopLock");
const shopActionBtn=document.getElementById("shopActionBtn");
const shopPrev=document.getElementById("shopPrev");
const shopNext=document.getElementById("shopNext");
const shopClose=document.getElementById("shopClose");
let shopIndex=0;

/* APPLY SKIN */
function applyCurrentSkin(falling=false,dead=false){
  const skin=SKINS.find(s=>s.id===currentSkinId);
  if(dead){player.src=skin.dead;}
  else if(falling){player.src=skin.fall;}
  else{player.src=skin.fly;}
}
applyCurrentSkin(false,false);

/* SHOP UI */
function updateShopUI(){
  const skin=SKINS[shopIndex];
  shopSkinImage.src=skin.icon;
  shopInfo.textContent=skin.name+" - "+skin.price+" bananas";
  if(skin.unlocked){
    shopLock.textContent="";
    if(currentSkinId===skin.id){
      shopActionBtn.textContent="Equipped";
      shopActionBtn.disabled=true;
    }else{
      shopActionBtn.textContent="Equip";
      shopActionBtn.disabled=false;
    }
  }else{
    shopLock.textContent="Locked";
    shopActionBtn.textContent="Buy";
    shopActionBtn.disabled=false;
  }
}

shopButton.onclick=()=>{
  shopOverlay.style.display="flex";
  updateShopUI();
};
shopClose.onclick=()=>{shopOverlay.style.display="none";};
shopPrev.onclick=()=>{shopIndex=(shopIndex-1+SKINS.length)%SKINS.length; updateShopUI();};
shopNext.onclick=()=>{shopIndex=(shopIndex+1)%SKINS.length; updateShopUI();};
shopActionBtn.onclick=()=>{
  const skin=SKINS[shopIndex];
  if(skin.unlocked){
    currentSkinId=skin.id;
    localStorage.setItem("vg_current_skin",currentSkinId);
    applyCurrentSkin(false,false);
    updateShopUI();
  }else{
    if(window.bananasTotal>=skin.price){
      bananasTotal-=skin.price;
      localStorage.setItem("vg_bananas",String(bananasTotal));
      bananaText.textContent="Bananas: "+bananasTotal;
      skin.unlocked=true;
      if(!ownedSkins.includes(skin.id)){ownedSkins.push(skin.id);localStorage.setItem("vg_owned_skins",JSON.stringify(ownedSkins));}
      updateShopUI();
    }
  }
};

/* =========================
   INTRO SYSTEM
========================= */
player.style.display="none";
scoreEl.style.display="none";
heartsEl.style.display="none";

function runIntro(){
  allowInput=false;
  setTimeout(()=>{
    player.style.display="block";
    scoreEl.style.display="block";
    heartsEl.style.display="block";
    allowInput=true;
  },3500);
}
runIntro();

/* =========================
   RESTART SYSTEM
========================= */
restartBtn.onclick=()=>{
  planes.forEach(p=>p.remove()); planes=[];
  bananas.forEach(b=>b.remove()); bananas=[];
  y=window.innerHeight/2; velocity=0;
  score=0; lives=3; safeFrames=0;
  started=false; running=false; paused=false;
  allowInput=false;
  applyCurrentSkin(false,false);
  player.style.top=y+"px"; player.style.display="block";
  updateHearts();
  scoreEl.textContent="Score: 0"; 
  pauseBtn.style.display="block"; 
  allowInput=true;
  requestAnimationFrame(gameLoop);
};

/* =========================
   PAUSE BUTTON
========================= */
pauseBtn.onclick=()=>{
  if(!running) return;
  paused=!paused;
  pauseBtn.innerHTML=paused
    ? '<i class="fa-solid fa-play" style="color: rgb(30, 48, 80);"></i>'
    : '<i class="fa-solid fa-pause" style="color: rgb(30, 48, 80);"></i>';
  if(!paused) requestAnimationFrame(gameLoop);
};

/* =========================
   HEARTS UPDATE
========================= */
function updateHearts(){
  heartsEl.textContent="❤️".repeat(lives);
}

/* =========================
   BANANA COLLECT
========================= */
function collectBanana(){
  bananasTotal++;
  localStorage.setItem("vg_bananas",String(bananasTotal));
  bananaText.textContent="Bananas: "+bananasTotal;
}

/* =========================
   FINAL GAME INIT
========================= */
allowInput=true;
applyCurrentSkin(false,false);
updateHearts();

</script>
</body>
</html>
